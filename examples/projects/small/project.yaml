# examples/projects/small/project.yaml — Phase 5 D-B2 small sample ($0 stub).
#
# This sample is the `make dry-run-v1` target (DIST-05) — $0 LLM cost, repeatable
# without burning quota. The stub-subagent (cmd/stub-subagent) returns canned
# success envelopes regardless of targetRepo (verified in plan 06 main_test.go;
# MEDIUM-7 placeholder design), so this sample exercises K8s plumbing (CRD
# admission, controller dispatch, Pod lifecycle) without any network or LLM cost.
#
# Multi-doc YAML: Namespace + per-namespace deps + Project. Applying this file
# via `kubectl apply -f examples/projects/small/project.yaml` is the complete
# static bootstrap — ONE dynamic step remains (the chart generates a
# cluster-unique signing key, so it cannot live in this file). After apply:
#
#   SIGNING_KEY=$(kubectl get secret tide-signing-key -n tide-system \
#     -o jsonpath='{.data.TIDE_SIGNING_KEY}')
#   kubectl apply -f - <<EOF
#   apiVersion: v1
#   kind: Secret
#   metadata: { name: tide-signing-key, namespace: tide-sample-small }
#   type: Opaque
#   data: { TIDE_SIGNING_KEY: ${SIGNING_KEY} }
#   EOF
#
# Phase 8/9 per-namespace deps (mirrors examples/projects/medium/
# per-namespace-resources.yaml, trimmed to what the no-git $0 path needs):
# the chart provisions tide-projects PVC + SAs only in tide-system, but the
# controller's reconciler and Jobs expect them in the Project's namespace.
# Without them the Project requeues forever on "shared PVC not found".
---
apiVersion: v1
kind: Namespace
metadata:
  name: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tide-projects
  namespace: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
spec:
  # ReadWriteOnce on purpose: this sample targets kind/minikube smoke runs
  # (rancher.io/local-path has no RWX) and dispatch is wave-serialized, so a
  # single-writer mount is safe. Production Projects use RWX — see
  # examples/projects/medium/per-namespace-resources.yaml and docs/rwx-drivers.md.
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tide-subagent
  namespace: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
  # Identity for the stub planner/executor pods (D-G3). No tide-push SA here:
  # this Project declares no spec.git block, so clone/push Jobs never dispatch.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tide-reporter
  namespace: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
  # Identity for the in-namespace reader Job (cmd/tide-reporter, plan 09-04)
  # that materializes child CRs from the planner's out.json.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tide-reporter
  namespace: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
rules:
  # Least-privilege mirror of the chart's tide-reporter Role in tide-system
  # (list backs the materializer idempotency guard; get projects resolves the
  # parent UID). No watch/update/delete/patch, no secrets, no core resources.
  - apiGroups: ["tideproject.k8s"]
    resources: ["milestones", "phases", "plans", "tasks", "waves"]
    verbs: ["create", "get", "list"]
  - apiGroups: ["tideproject.k8s"]
    resources: ["projects"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tide-reporter
  namespace: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tide-reporter
subjects:
  - kind: ServiceAccount
    name: tide-reporter
    namespace: tide-sample-small
---
apiVersion: v1
kind: Pod
metadata:
  name: tide-pvc-warmup
  namespace: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
spec:
  # WaitForFirstConsumer breaker: local-path provisioners won't bind the PVC
  # until a Pod is scheduled against it, while the ProjectReconciler's
  # PVC-Bound gate blocks dispatch until it binds — a deadlock with no
  # consumer. This throwaway pod schedules, triggers binding, and exits;
  # the PVC stays Bound. Mirrors acceptance-v1.sh / kind suite prewarm.
  restartPolicy: Never
  containers:
    - name: warmup
      image: busybox:1.36
      command: ["true"]
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: tide-projects
---
apiVersion: tideproject.k8s/v1alpha1
kind: Project
metadata:
  name: small-project
  namespace: tide-sample-small
  labels:
    app.kubernetes.io/name: tide
    app.kubernetes.io/managed-by: tide-sample
    tideproject.k8s/sample: small
spec:
  # RFC 2606 .example TLD sentinel — non-routable by design. The stub-subagent
  # ignores targetRepo entirely and returns canned success envelopes regardless
  # of this value (MEDIUM-7 design lock, verified in plan 06 main_test.go).
  # https:// scheme is required: the Phase 8 CEL validator rejects file:// URLs
  # because go-git's file:// transport shells out to a system git binary that is
  # absent from production images. The .example TLD makes the sentinel's
  # placeholder intent unmistakable — no real server exists at this host.
  targetRepo: https://git.example.internal/stub/no-such-repo.git

  budget:
    # $0 — stub-subagent makes zero API calls. Hard cap of 0 is the strongest
    # safety signal: if any real LLM dispatch happened, the budget gate would
    # halt immediately with Phase=BudgetExceeded.
    absoluteCapCents: 0

  subagent:
    # ghcr.io/jsquirrelz/tide-stub-subagent:1.0.0 is the v1 stub image
    # (Phase 5 D-X3 chart version bump synchronizes the tag). The stub binary
    # is cmd/stub-subagent (Phase 2 SUB-04). Tag has no "v" prefix — matches
    # the appVersion-resolved tag from the chart (CHART-01 / Phase 6 A7).
    image: ghcr.io/jsquirrelz/tide-stub-subagent:1.0.0
    model: stub

  gates:
    # All gates set to `auto` so the small sample runs end-to-end without any
    # human approval steps — it's a smoke test, not a gate-policy demo.
    milestone: auto
    phase: auto
    plan: auto
    task: auto
    pauseBetweenWaves: false
