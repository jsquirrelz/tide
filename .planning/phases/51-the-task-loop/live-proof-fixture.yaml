apiVersion: v1
kind: Namespace
metadata: {name: tide-verify-proof}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tide-subagent
  namespace: tide-verify-proof
automountServiceAccountToken: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: tide-projects, namespace: tide-verify-proof}
spec: {accessModes: [ReadWriteOnce], resources: {requests: {storage: 1Gi}}}
---
apiVersion: v1
kind: Secret
metadata: {name: tide-signing-key, namespace: tide-verify-proof}
type: Opaque
data: {TIDE_SIGNING_KEY: <COPY_FROM__kubectl get secret tide-signing-key -n tide-system -o jsonpath={.data.TIDE_SIGNING_KEY}>
---
apiVersion: v1
kind: Secret
metadata: {name: tide-provider-secret, namespace: tide-verify-proof}
type: Opaque
data: {ANTHROPIC_API_KEY: <BASE64_OF_REAL_KEY__cat ~/.tide/anthropic.key | tr -d "\n" | base64>
---
apiVersion: tideproject.k8s/v1alpha3
kind: Project
metadata: {name: tide-verify-proof-project, namespace: tide-verify-proof}
spec:
  schemaRevision: v1alpha3
  targetRepo: https://github.com/example/tide-verify-proof.git
  providerSecretRef: tide-provider-secret
  budget: {absoluteCapCents: 100000}
  # Model must be REAL (not "stub"): buildVerifierEnvelopeIn inherits the
  # task-level model (task_controller.go ResolveProvider(project,"task")), and
  # the verifier makes a real Anthropic call with it — "stub" 404s upstream.
  # The executor still runs the stub image (image resolution is independent of
  # model; dev.testMode drives stub behavior), so only the verifier bills.
  # sonnet-4-6, not haiku-4-5: haiku investigation-spirals to the LangGraph
  # recursion limit on the verifier prompt (observed live 2026-07-19); sonnet
  # converges to a structured verdict in a handful of tool calls.
  subagent: {model: claude-sonnet-4-6}
  gates: {milestone: auto, phase: auto, plan: auto, task: auto, pauseBetweenWaves: false}
---
apiVersion: tideproject.k8s/v1alpha3
kind: Milestone
metadata: {name: tide-verify-proof-milestone, namespace: tide-verify-proof}
spec: {projectRef: tide-verify-proof-project}
---
apiVersion: tideproject.k8s/v1alpha3
kind: Phase
metadata: {name: tide-verify-proof-phase, namespace: tide-verify-proof}
spec: {milestoneRef: tide-verify-proof-milestone}
---
apiVersion: tideproject.k8s/v1alpha3
kind: Plan
metadata:
  name: tide-verify-proof-plan
  namespace: tide-verify-proof
  labels: {tideproject.k8s/project: tide-verify-proof-project}
spec: {phaseRef: tide-verify-proof-phase}
---
apiVersion: tideproject.k8s/v1alpha3
kind: Task
metadata:
  name: proof-task-red
  namespace: tide-verify-proof
  labels: {tideproject.k8s/project: tide-verify-proof-project, tideproject.k8s/wave-index: "0"}
spec:
  planRef: tide-verify-proof-plan
  promptPath: children/task-01.json
  filesTouched: [proof.go]
  declaredOutputPaths: [proof.go]
  dev: {testMode: success}
  # Red gate that is SEMANTICALLY REPAIRABLE: the file is absent, so the gate
  # fails, but a fresh executor attempt could plausibly create it — the
  # verifier judges REPAIRABLE and drives the repair loop. (A literal "false"
  # gate is honestly unfixable; a sharp judge correctly calls that BLOCKED,
  # which forecloses the loop this fixture exists to prove.)
  verification: {phase: Locked, gateCommand: "test -f VERIFIED.md", maxIterations: 2, onExhaustion: requireApproval}
