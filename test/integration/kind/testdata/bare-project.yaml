---
# bare-project.yaml â€” Layer B fixture for plan 07-05's bare_project_test.go.
#
# Tests the full Projectâ†’Milestoneâ†’Phaseâ†’Planâ†’Task self-bootstrap at $0
# (stub). No pre-applied Milestone â€” the ProjectReconciler authors it via
# planner Job dispatch (REQ-1..REQ-5). No spec.git â€” $0 path must not
# trigger clone/push Jobs (D-04: git guard is
# project.Spec.Git != nil && project.Spec.Git.RepoURL != "").
#
# The subagent image is resolved from CLAUDE_SUBAGENT_IMAGE env, which the
# harness sets via `--set subagent.defaults.image=ghcr.io/jsquirrelz/tide-stub-subagent:test`
# (Phase 13 D-01/D-02: explicit stub opt-in). Per-Project spec.subagent.image
# is intentionally omitted; the harness Helm override routes to the stub.
#
# W13 note: ownerReferences are OMITTED from this YAML. ProjectReconciler
# sets them on child CRs via internal/owner.EnsureOwnerRef on first reconcile
# (against the real Project UID). This is exactly the contract under test.

apiVersion: v1
kind: Namespace
metadata:
  name: bare-project-test
---
# Provider Secret â€” stub-subagent does not use the API key but credproxy
# requires ANTHROPIC_API_KEY to start (requireEnv fail-fast in cmd/credproxy).
# Value is base64("test-api-key-stub-subagent-does-not-use-it").
apiVersion: v1
kind: Secret
metadata:
  name: tide-provider-secret
  namespace: bare-project-test
type: Opaque
data:
  ANTHROPIC_API_KEY: dGVzdC1hcGkta2V5LXN0dWItc3ViYWdlbnQtZG9lcy1ub3QtdXNlLWl0
---
apiVersion: tideproject.k8s/v1alpha2
kind: Project
metadata:
  name: bare-project
  namespace: bare-project-test
spec:
  # Sentinel: RFC 2606 .example TLD â€” non-routable by design. The stub-subagent
  # ignores targetRepo entirely and returns canned envelopes regardless of this
  # value. https:// scheme passes the Phase 8 CEL rule that rejects file:// URLs
  # (file:// transport requires a system git binary absent from production images).
  targetRepo: "https://git.example.internal/stub/no-such-repo.git"
  providerSecretRef: "tide-provider-secret"
  budget:
    absoluteCapCents: 0
  subagent:
    model: stub
  gates:
    milestone: auto
    phase: auto
    plan: auto
    task: auto
    pauseBetweenWaves: false
