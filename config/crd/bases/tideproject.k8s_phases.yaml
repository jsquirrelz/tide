---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: phases.tideproject.k8s
spec:
  group: tideproject.k8s
  names:
    kind: Phase
    listKind: PhaseList
    plural: phases
    singular: phase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: Phase is the Schema for the phases API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Phase
            properties:
              dependsOn:
                description: |-
                  DependsOn lists any level node (Milestone/Phase/Plan/Task) in this Project
                  that this Phase's execution depends on. Entries may target any node at any
                  hierarchy level within the Project (any-level targets, D-02). Coarse scope
                  refs are fan-out expanded by the Phase 24 assembler (D-06).
                items:
                  minLength: 1
                  type: string
                type: array
                x-kubernetes-validations:
                - message: dependsOn entries must not be empty strings
                  rule: '!self.exists(d, d == '''')'
              milestoneRef:
                description: MilestoneRef is the name of the owning Milestone (same
                  namespace).
                minLength: 1
                type: string
              sharedContext:
                description: |-
                  SharedContext is the wave-scoped shared context string stamped by the
                  orchestrator at object creation time (Phase 20 D-05). Byte-identical
                  across all objects in the same wave. Read by BuildPlannerEnvelope when
                  dispatching this object's planner Job (D-07 uniform path).
                type: string
            required:
            - milestoneRef
            type: object
          status:
            description: status defines the observed state of Phase
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              loopStatus:
                description: |-
                  LoopStatus is the level-verify loop's observed-state contract at the
                  Phase boundary (Phase 52 D-07). Phase runs with MaxIterations:0
                  (LOOP-03-compliant, D-02's resolver), so in practice only
                  LastEvaluation + ExitReason are populated — there is no repair branch
                  at this level, any non-APPROVED verdict escalates immediately.
                properties:
                  conditions:
                    items:
                      description: Condition contains details for one aspect of the
                        current state of this API Resource.
                      properties:
                        lastTransitionTime:
                          description: |-
                            lastTransitionTime is the last time the condition transitioned from one status to another.
                            This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                          format: date-time
                          type: string
                        message:
                          description: |-
                            message is a human readable message indicating details about the transition.
                            This may be an empty string.
                          maxLength: 32768
                          type: string
                        observedGeneration:
                          description: |-
                            observedGeneration represents the .metadata.generation that the condition was set based upon.
                            For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                            with respect to the current state of the instance.
                          format: int64
                          minimum: 0
                          type: integer
                        reason:
                          description: |-
                            reason contains a programmatic identifier indicating the reason for the condition's last transition.
                            Producers of specific condition types may define expected values and meanings for this field,
                            and whether the values are considered a guaranteed API.
                            The value should be a CamelCase string.
                            This field may not be empty.
                          maxLength: 1024
                          minLength: 1
                          pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                          type: string
                        status:
                          description: status of the condition, one of True, False,
                            Unknown.
                          enum:
                          - "True"
                          - "False"
                          - Unknown
                          type: string
                        type:
                          description: type of condition in CamelCase or in foo.example.com/CamelCase.
                          maxLength: 316
                          pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                          type: string
                      required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - type
                    x-kubernetes-list-type: map
                  costCents:
                    description: |-
                      CostCents is the cumulative spend (USD cents) across all iterations
                      of this loop so far, checked against LoopPolicy.BudgetCents.
                    format: int64
                    minimum: 0
                    type: integer
                  effectiveMaxIterations:
                    description: |-
                      EffectiveMaxIterations is the RESOLVED MaxIterations governing this
                      loop — ResolveLoopPolicy's output (authored > chart tier > compiled
                      default/floor), stamped by the controller at every Verifying entry so
                      read-only consumers (the dashboard API, which never receives the chart
                      tier) can surface the bound that actually governs the loop instead of
                      the raw authored Spec value (Phase 53 WR-01). A bounded scalar of the
                      CURRENT loop's parameterization — never history (LOOP-03-compatible).
                      0 means "not yet stamped" (loop never engaged, or a pre-Phase-53
                      object); consumers fall back to the authored Spec value.
                    format: int32
                    minimum: 0
                    type: integer
                  exitReason:
                    description: |-
                      ExitReason records the bounded exit/escalation outcome once the loop
                      has stopped iterating (empty while the loop is still active).
                    enum:
                    - approved
                    - iterationsExhausted
                    - durationExhausted
                    - budgetExhausted
                    - escalated
                    type: string
                  iteration:
                    description: |-
                      Iteration is the current attempt number (1-indexed once dispatched;
                      0 before the loop's first iteration).
                    format: int32
                    minimum: 0
                    type: integer
                  lastEvaluation:
                    description: |-
                      LastEvaluation is the bounded verdict summary from the most recent
                      evaluator/environment feedback — current-iteration only, never a
                      slice/history of past evaluations (LOOP-03).
                    properties:
                      completedAt:
                        description: CompletedAt is when the evaluator produced this
                          verdict.
                        format: date-time
                        type: string
                      decision:
                        description: |-
                          Decision is the locally-scoped verdict string ("APPROVED",
                          "REPAIRABLE", or "BLOCKED") — never the imported pkg/dispatch.GateDecision
                          type, per the two-homes design note above.
                        enum:
                        - APPROVED
                        - REPAIRABLE
                        - BLOCKED
                        type: string
                      findingsCount:
                        description: |-
                          FindingsCount is the total number of findings the evaluator reported,
                          without the findings[] array itself.
                        format: int32
                        minimum: 0
                        type: integer
                      highSeverityCount:
                        description: |-
                          HighSeverityCount is the number of findings at the highest severity
                          tier the evaluator reported.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                  parentRunID:
                    description: |-
                      ParentRunID identifies the run that produced the mutable candidate
                      this LoopStatus is evaluating, correlating LoopStatus back to the
                      trace/artifact history where iteration-by-iteration detail lives
                      (LOOP-03 — that detail is never duplicated into `.status`).
                    type: string
                type: object
              phase:
                type: string
              phaseReporterSpawnedUID:
                description: |-
                  PhaseReporterSpawnedUID is the UID of the completed planner Job whose
                  reporter Job has been spawned for this level — the durable gate closing
                  the CR-01 window where the name-only spawn gate re-opens after the
                  reporter Job's 300s TTL-GC and a sustained-reconcile parent re-Creates a
                  duplicate reporter with recomputed options (Phase 47 gap-closure; mirrors
                  PhaseRolledUpUID's role for budget rollup). The value is the completed
                  Job's UID, falling back to the deterministic planner-Job name when the
                  caller observes a nil Job object.
                type: string
              phaseRolledUpUID:
                description: |-
                  PhaseRolledUpUID is the name of this Phase's planner Job whose Usage
                  was successfully rolled up into the Project budget. Prevents double-counting
                  when the reporter Job has TTL-GC'd before a reconcile re-observes it.
                  Mirrors the project-level budget rollup marker at the Phase level
                  per the D-03 level-specific marker pattern. Phase 31 ADOPT-04 / D-03.
                type: string
              phaseSpanEmittedUID:
                description: |-
                  PhaseSpanEmittedUID is the UID of the planner Job whose completion has
                  already had its dispatch span synthesized. Gates one-span-per-Job-attempt
                  emission INDEPENDENT of envReadOK — deliberately not reusing
                  PhaseRolledUpUID, whose envReadOK gating would re-emit degraded spans on
                  every reconcile (Pitfall 2). Keyed by Job UID, not name: planner Job names
                  are deterministic, so a deleted-and-recreated attempt reuses the name but
                  never the UID (D-02: each retry attempt produces its own span).
                  Phase 42 D-02/D-04.
                type: string
              phaseTraceSpanID:
                description: |-
                  PhaseTraceSpanID is this level's own synthesized dispatch-span OTel
                  SpanID hex, persisted as the durable parent carrier for child-level
                  spans and Phase 46's dashboard deep-link (Phase 43 PROP-02). Never
                  stores the TraceID — always re-derivable from Project.UID via
                  otelai.TraceIDFromUID (D-03/D-04).
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: a phase cannot depend on itself
          rule: '!has(self.spec.dependsOn) || !(self.metadata.name in self.spec.dependsOn)'
    served: true
    storage: true
    subresources:
      status: {}
