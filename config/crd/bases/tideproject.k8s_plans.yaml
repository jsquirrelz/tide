---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: plans.tideproject.k8s
spec:
  group: tideproject.k8s
  names:
    kind: Plan
    listKind: PlanList
    plural: plans
    singular: plan
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: Plan is the Schema for the plans API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Plan
            properties:
              dependsOn:
                description: |-
                  DependsOn lists hierarchy nodes (Task/Plan/Phase/Milestone names) in this
                  Project that this Plan's Tasks implicitly depend on (DEPS-02). Used at
                  assembly time (Phase 24) for fan-out: a dep on a Plan means "all Tasks in
                  that Plan must complete before any Task in this Plan may dispatch."
                  Progressive refinement (D-03) may narrow this to a specific Task-level dep
                  as planning descends: MB requires MA → MB requires MA-P3 → MB requires
                  MA-P3-PB → MB requires MA-P3-PB-task-07. Resolved in-memory at assembly
                  time (D-05); authored coarse dependsOn is the only persisted truth.
                items:
                  minLength: 1
                  type: string
                type: array
                x-kubernetes-validations:
                - message: dependsOn entries must not be empty strings
                  rule: '!self.exists(d, d == '''')'
              phaseRef:
                description: PhaseRef is the name of the owning Phase (same namespace).
                minLength: 1
                type: string
              sharedContext:
                description: |-
                  SharedContext is the wave-scoped shared context string stamped by the
                  orchestrator at object creation time (Phase 20 D-05). Byte-identical
                  across all siblings in the same wave. Read by BuildPlannerEnvelope when
                  dispatching this object's planner Job (D-07 uniform path).
                type: string
              verification:
                description: |-
                  Verification is the plan-check verification contract (Phase 52 D-01),
                  the SAME standalone VerificationSpec type task_types.go defines for
                  Task — zero shape changes, so the type-attached CEL
                  immutable-once-Locked rule travels here automatically. Resolution
                  precedence is Task > Plan > Project (ResolveLoopPolicy); an absent
                  contract here falls back to ProjectSpec.Verification.Plan, else the
                  plan-check stage is off.
                properties:
                  commands:
                    description: |-
                      Commands lists additional acceptance-signal commands beyond
                      GateCommand. Plan 06 resolves this list onto the transported
                      VerifyContext.Commands list; the Plan 02 verifier executes EACH
                      command out-of-band (exit codes parsed, any non-zero dominates any
                      LLM APPROVED — TASK-04). Not decorative.
                    items:
                      type: string
                    type: array
                  evaluator:
                    description: |-
                      Evaluator names the evaluator config this verification contract
                      resolves against (same-namespace name ref, plain string — not
                      corev1.LocalObjectReference).
                    type: string
                  gateCommand:
                    description: |-
                      GateCommand is the single canonical primary pass-criterion command —
                      resolves onto pkg/dispatch.VerifyContext.GateCommand at verifier
                      dispatch time (Plan 06). This is planner-authored data EXECUTED FOR
                      REAL downstream, NOT decorative/status text: the independent verifier
                      runs it and parses the exit code (TASK-04); a non-zero exit dominates
                      any LLM judge's APPROVED verdict.
                    type: string
                  maxIterations:
                    description: |-
                      MaxIterations bounds the Task loop's repeat policy: the maximum
                      number of evaluator-driven fresh attempts the loop may dispatch
                      before halting (D-07/TASK-05).
                    format: int32
                    minimum: 0
                    type: integer
                  onExhaustion:
                    description: |-
                      OnExhaustion declares the bounded exit path once MaxIterations is
                      reached without an APPROVED evaluation. In Phase 51 BOTH enum values
                      resolve IDENTICALLY to ConditionVerifyHalt + await `tide resume` —
                      per-value differentiation (a future LoopPolicy.EscalationPolicy) is
                      Phase 52 scope. Declared-but-uniform-now, never unenforced: both
                      values halt dispatch today.
                    enum:
                    - escalate
                    - requireApproval
                    type: string
                  phase:
                    description: |-
                      Phase is the lifecycle state governing immutability: Draft is freely
                      editable, Locked is immutable except for a Locked->Superseded
                      transition (which mints a new version to carry further edits),
                      Superseded is a terminal historical record. Transition rules are
                      skipped on CREATE (no oldSelf) — a Draft-at-create is unconstrained.
                    enum:
                    - Draft
                    - Locked
                    - Superseded
                    type: string
                  requiredArtifacts:
                    description: |-
                      RequiredArtifacts lists workspace-relative paths the verifier
                      confirms exist.
                    items:
                      type: string
                    type: array
                  version:
                    description: |-
                      Version is the monotonic version number, incremented each time a
                      Locked contract is superseded by a new Draft.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
                x-kubernetes-validations:
                - message: verification is immutable once Locked; supersede to a new
                    version to change it
                  rule: oldSelf.phase != 'Locked' || self == oldSelf || self.phase
                    == 'Superseded'
            required:
            - phaseRef
            type: object
          status:
            description: status defines the observed state of Plan
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              cycleEdges:
                description: |-
                  CycleEdges holds the human-readable edge representations for any cycle detected
                  during DAG validation (populated when ValidationState=CycleDetected, Phase 2+).
                items:
                  type: string
                type: array
              integratedThroughWave:
                description: |-
                  IntegratedThroughWave records the highest 1-indexed wave number whose task
                  branches have been fully integrated into the run branch. The per-wave
                  integration trigger in reconcileWaveMaterialization gates on this field
                  to avoid re-firing integration every reconcile cycle (D-02/SC-3).
                  Zero means no waves have been integrated yet.
                type: integer
              loopStatus:
                description: |-
                  LoopStatus is the plan-check loop's own observed-state contract
                  (Phase 52 D-06). Iteration counts quality re-plans ONLY — it is
                  DISTINCT from WaveIntegration.Attempts (infra-retry ≠ quality-
                  iteration, Phase 51 D-05 applied one level up: a wave-integration Job
                  failure is a transient infra retry, not a plan-check evaluator
                  verdict) and from the planner Job's own attempt identity
                  (tide-plan-<uid>-<attempt>, a dispatch retry counter, not a loop
                  iteration counter). LOOP-03: current-iteration summary only, no
                  accumulating history — see TestLoopStatus_NoForbiddenFields.
                properties:
                  conditions:
                    items:
                      description: Condition contains details for one aspect of the
                        current state of this API Resource.
                      properties:
                        lastTransitionTime:
                          description: |-
                            lastTransitionTime is the last time the condition transitioned from one status to another.
                            This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                          format: date-time
                          type: string
                        message:
                          description: |-
                            message is a human readable message indicating details about the transition.
                            This may be an empty string.
                          maxLength: 32768
                          type: string
                        observedGeneration:
                          description: |-
                            observedGeneration represents the .metadata.generation that the condition was set based upon.
                            For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                            with respect to the current state of the instance.
                          format: int64
                          minimum: 0
                          type: integer
                        reason:
                          description: |-
                            reason contains a programmatic identifier indicating the reason for the condition's last transition.
                            Producers of specific condition types may define expected values and meanings for this field,
                            and whether the values are considered a guaranteed API.
                            The value should be a CamelCase string.
                            This field may not be empty.
                          maxLength: 1024
                          minLength: 1
                          pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                          type: string
                        status:
                          description: status of the condition, one of True, False,
                            Unknown.
                          enum:
                          - "True"
                          - "False"
                          - Unknown
                          type: string
                        type:
                          description: type of condition in CamelCase or in foo.example.com/CamelCase.
                          maxLength: 316
                          pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                          type: string
                      required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - type
                    x-kubernetes-list-type: map
                  costCents:
                    description: |-
                      CostCents is the cumulative spend (USD cents) across all iterations
                      of this loop so far, checked against LoopPolicy.BudgetCents.
                    format: int64
                    minimum: 0
                    type: integer
                  exitReason:
                    description: |-
                      ExitReason records the bounded exit/escalation outcome once the loop
                      has stopped iterating (empty while the loop is still active).
                    enum:
                    - approved
                    - iterationsExhausted
                    - durationExhausted
                    - budgetExhausted
                    - escalated
                    type: string
                  iteration:
                    description: |-
                      Iteration is the current attempt number (1-indexed once dispatched;
                      0 before the loop's first iteration).
                    format: int32
                    minimum: 0
                    type: integer
                  lastEvaluation:
                    description: |-
                      LastEvaluation is the bounded verdict summary from the most recent
                      evaluator/environment feedback — current-iteration only, never a
                      slice/history of past evaluations (LOOP-03).
                    properties:
                      completedAt:
                        description: CompletedAt is when the evaluator produced this
                          verdict.
                        format: date-time
                        type: string
                      decision:
                        description: |-
                          Decision is the locally-scoped verdict string ("APPROVED",
                          "REPAIRABLE", or "BLOCKED") — never the imported pkg/dispatch.GateDecision
                          type, per the two-homes design note above.
                        enum:
                        - APPROVED
                        - REPAIRABLE
                        - BLOCKED
                        type: string
                      findingsCount:
                        description: |-
                          FindingsCount is the total number of findings the evaluator reported,
                          without the findings[] array itself.
                        format: int32
                        minimum: 0
                        type: integer
                      highSeverityCount:
                        description: |-
                          HighSeverityCount is the number of findings at the highest severity
                          tier the evaluator reported.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                  parentRunID:
                    description: |-
                      ParentRunID identifies the run that produced the mutable candidate
                      this LoopStatus is evaluating, correlating LoopStatus back to the
                      trace/artifact history where iteration-by-iteration detail lives
                      (LOOP-03 — that detail is never duplicated into `.status`).
                    type: string
                type: object
              phase:
                type: string
              planReporterSpawnedUID:
                description: |-
                  PlanReporterSpawnedUID is the UID of the completed planner Job whose
                  reporter Job has been spawned for this level — the durable gate closing
                  the CR-01 window where the name-only spawn gate re-opens after the
                  reporter Job's 300s TTL-GC and a sustained-reconcile parent re-Creates a
                  duplicate reporter with recomputed options (Phase 47 gap-closure; mirrors
                  PlanRolledUpUID's role for budget rollup). The value is the completed
                  Job's UID, falling back to the deterministic planner-Job name when the
                  caller observes a nil Job object.
                type: string
              planRolledUpUID:
                description: |-
                  PlanRolledUpUID is the name of this Plan's planner Job whose Usage
                  was successfully rolled up into the Project budget. Prevents double-counting
                  when the reporter Job has TTL-GC'd before a reconcile re-observes it.
                  Mirrors the project-level budget rollup marker at the Plan level
                  per the D-03 level-specific marker pattern (D-03a new addition). Phase 31 ADOPT-04 / D-03.
                type: string
              planSpanEmittedUID:
                description: |-
                  PlanSpanEmittedUID is the UID of the planner Job whose completion has
                  already had its dispatch span synthesized. Gates one-span-per-Job-attempt
                  emission INDEPENDENT of envReadOK — deliberately not reusing
                  PlanRolledUpUID, whose envReadOK gating would re-emit degraded spans on
                  every reconcile (Pitfall 2). Keyed by Job UID, not name: planner Job names
                  are deterministic, so a deleted-and-recreated attempt reuses the name but
                  never the UID (D-02: each retry attempt produces its own span).
                  Phase 42 D-02/D-04.
                type: string
              planTraceSpanID:
                description: |-
                  PlanTraceSpanID is this level's own synthesized dispatch-span OTel
                  SpanID hex, persisted as the durable parent carrier for child-level
                  spans and Phase 46's dashboard deep-link (Phase 43 PROP-02). Never
                  stores the TraceID — always re-derivable from Project.UID via
                  otelai.TraceIDFromUID (D-03/D-04).
                type: string
              validationState:
                description: |-
                  ValidationState records the result of the Plan admission webhook's DAG and
                  file-touch validation (Phase 2+). Set by Plan 11's webhook after admission.
                enum:
                - Pending
                - Validated
                - CycleDetected
                - FileTouchMismatch
                type: string
              waveIntegration:
                description: |-
                  WaveIntegration records the bounded auto-retry state of the current
                  wave-integration Job (Phase 34 D-04). Reset (Wave/Attempts) whenever
                  reconcileWaveBoundary advances to a new blocking wave.
                properties:
                  attempts:
                    description: |-
                      Attempts is the number of wave-integration Jobs dispatched so far for
                      Wave. The controller stops dispatching once Attempts reaches
                      maxWaveIntegrationAttempts (Phase 34 D-04) and marks the Plan Failed
                      with ReasonWaveIntegrationFailed.
                    format: int32
                    type: integer
                  lastAttemptTime:
                    description: |-
                      LastAttemptTime is the timestamp of the most recently dispatched
                      wave-integration attempt. Drives the capped exponential requeue backoff
                      (boundaryPushRequeue, shared with the #13b machine).
                    format: date-time
                    type: string
                  lastError:
                    description: |-
                      LastError carries the most recent wave-integration failure reason (from
                      the push-result envelope) for operator visibility. Cleared on success.
                    type: string
                  wave:
                    description: |-
                      Wave is the 0-indexed Kahn wave number this Attempts counter refers to.
                      The counter resets to 0 whenever the blocking wave changes (a new wave's
                      integration Job gets a fresh retry budget).
                    type: integer
                type: object
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: a plan cannot depend on itself
          rule: '!has(self.spec.dependsOn) || !(self.metadata.name in self.spec.dependsOn)'
    served: true
    storage: true
    subresources:
      status: {}
