---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: projects.tideproject.k8s
spec:
  group: tideproject.k8s
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the Schema for the projects API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Project
            properties:
              budget:
                description: Budget declares cost/token caps for this project (Phase
                  2+).
                properties:
                  absoluteCapCents:
                    description: AbsoluteCapCents is the hard spending limit in USD
                      cents for the project lifetime.
                    format: int64
                    minimum: 0
                    type: integer
                  rollingWindowCapCents:
                    description: |-
                      RollingWindowCapCents optionally caps spending over the window defined by the
                      BudgetStatus.WindowStart field.

                      DEFERRED (WR-02): As of Phase 2 only AbsoluteCapCents is enforced.
                      WindowStart is set on first roll-up and never reset, so the rolling cap
                      behaves identically to an absolute cap. A future phase will add
                      window-boundary reset logic in ProjectReconciler that compares
                      (now - WindowStart) against the configured window and zeros the tally
                      when crossed; until then this field is documentation-only and should
                      not be relied on for cost control.
                    format: int64
                    type: integer
                required:
                - absoluteCapCents
                type: object
              gates:
                description: Gates declares per-level human gate policy (Phase 4).
                properties:
                  milestone:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  pauseBetweenWaves:
                    type: boolean
                  phase:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  plan:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  task:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                type: object
              git:
                description: |-
                  Git declares the per-Project target repo + creds for artifact push
                  (Phase 3 D-B6). Required for any Project whose lifecycle reaches push;
                  optional in v1.0 only for purely transient/test Projects.
                  Pointer so omitempty fully elides the field when absent — value-type
                  GitConfig{} would serialize as `git: {repoURL: ""}` and trip the
                  RepoURL pattern validation on existing Phase 2 test fixtures.
                properties:
                  credsSecretRef:
                    description: |-
                      CredsSecretRef is the K8s Secret name (same-namespace) carrying the
                      HTTPS PAT in data key GIT_PAT. Cross-namespace Secret refs are NOT
                      permitted in v1.0 (threat-mitigation deferred to push Job — plan 03-06).
                    type: string
                  leaksConfigRef:
                    description: |-
                      LeaksConfigRef is an optional ConfigMap name carrying gitleaks rule
                      overrides (D-B3). Default gitleaks rules are embedded in the push image
                      when this is empty.
                    type: string
                  repoURL:
                    description: |-
                      RepoURL is the HTTPS URL of the target repo, e.g.,
                      "https://github.com/owner/repo.git". CEL pattern below catches non-HTTP
                      URLs at admission time.
                    pattern: ^https?://.+
                    type: string
                required:
                - credsSecretRef
                - repoURL
                type: object
              maxAttemptsPerTask:
                description: |-
                  MaxAttemptsPerTask caps the number of dispatch attempts per Task before
                  the Task is marked failed (Phase 2+, consumed by TaskReconciler in Plan 09).
                format: int32
                maximum: 10
                minimum: 1
                type: integer
              modelSelection:
                description: ModelSelection picks per-level model identifiers (Phase
                  2+).
                properties:
                  milestone:
                    type: string
                  phase:
                    type: string
                  plan:
                    type: string
                  task:
                    type: string
                type: object
              planAdmission:
                description: PlanAdmission controls file-touch policy during plan
                  validation (Phase 2+).
                properties:
                  fileTouchMode:
                    description: |-
                      FileTouchMode determines how file-touch mismatches are handled:
                        "strict" — reject plans whose file touches deviate from declarations.
                        "warn"   — admit but annotate the mismatch on Plan.Status.
                    enum:
                    - strict
                    - warn
                    type: string
                type: object
              providerSecretRef:
                description: ProviderSecretRef is the name of the K8s Secret carrying
                  provider credentials (Phase 2+).
                type: string
              providers:
                description: Providers lists per-provider configuration (rate limits,
                  etc.) (Phase 2+).
                items:
                  description: ProviderConfig configures one LLM provider (Phase 2+).
                  properties:
                    name:
                      description: Name is the provider identifier (only "anthropic"
                        is supported in v1).
                      enum:
                      - anthropic
                      type: string
                    requestsPerMinute:
                      description: RequestsPerMinute optionally caps API requests
                        per minute for this provider.
                      format: int32
                      type: integer
                    tokensPerMinute:
                      description: TokensPerMinute optionally caps token throughput
                        per minute for this provider.
                      format: int32
                      type: integer
                  required:
                  - name
                  type: object
                type: array
              secretRefs:
                description: SecretRefs references K8s Secrets for credentials (AUTH-01
                  — Phase 3).
                properties:
                  anthropicAPIKey:
                    description: AnthropicAPIKey is the Secret name carrying the LLM
                      API key.
                    type: string
                  gitCredentials:
                    description: GitCredentials is the Secret name carrying git push
                      credentials (PAT or SSH key).
                    type: string
                type: object
              subagent:
                description: |-
                  Subagent declares provider+model selection for planner/executor dispatch
                  (Phase 3 D-C2). When empty, Helm-chart defaults apply.
                properties:
                  image:
                    description: |-
                      Image is the default subagent image reference for all levels.
                      Example: "ghcr.io/jsquirrelz/tide-claude-subagent:v0.1.0".
                    type: string
                  levels:
                    description: Levels carries per-level overrides; any subset is
                      valid.
                    properties:
                      milestone:
                        description: Milestone optionally overrides settings for the
                          milestone planner.
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                      phase:
                        description: Phase optionally overrides settings for the phase
                          planner.
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                      plan:
                        description: Plan optionally overrides settings for the plan
                          planner.
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                      task:
                        description: Task optionally overrides settings for the task
                          executor.
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                    type: object
                  model:
                    description: |-
                      Model is the default model identifier for all levels.
                      Example: "claude-sonnet-4-6" (anthropic), "o1-mini" (openai).
                    type: string
                type: object
              targetRepo:
                description: TargetRepo is the URL of the repo this Project operates
                  on.
                minLength: 1
                type: string
            required:
            - targetRepo
            type: object
            x-kubernetes-validations:
            - message: targetRepo must be a valid http(s) or SSH git URL
              rule: self.targetRepo.startsWith('http') || self.targetRepo.startsWith('git@')
          status:
            description: status defines the observed state of Project
            properties:
              budget:
                description: |-
                  Budget records running spend tallies (Phase 2+).
                  PERSIST-02 / Pitfall 4: BudgetStatus is a tally object, not an aggregate schedule.
                properties:
                  costSpentCents:
                    description: CostSpentCents is the cumulative cost in USD cents
                      since WindowStart.
                    format: int64
                    type: integer
                  tokensSpent:
                    description: TokensSpent is the cumulative token count spent since
                      WindowStart.
                    format: int64
                    type: integer
                  windowStart:
                    description: WindowStart marks the beginning of the current rolling
                      budget window.
                    format: date-time
                    type: string
                type: object
              conditions:
                description: Conditions follow the standard K8s convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              git:
                description: |-
                  Git records per-Project push state — branch name, last pushed SHA, and
                  lease failure counter (Phase 3 D-B6). PERSIST-02 / Pitfall 4: this is a
                  per-project tally object, NOT an aggregate schedule.
                properties:
                  branchName:
                    description: |-
                      BranchName is the lifetime branch fixed at Project creation.
                      Format: "tide/run-<project>-<unix-epoch>".
                    type: string
                  lastPushedSHA:
                    description: |-
                      LastPushedSHA is the head SHA recorded on the most recent successful push.
                      Used as the lease for subsequent `git push --force-with-lease`.
                    type: string
                  leaseFailureCount:
                    description: |-
                      LeaseFailureCount tallies consecutive push lease rejections; reset to 0
                      on successful push. Reconciler halts (Phase=PushLeaseFailed) when this
                      count exceeds the configured retry budget.
                    format: int32
                    type: integer
                type: object
              phase:
                description: Phase is a high-level state label ("Pending", "Running",
                  "Complete", "Failed").
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
