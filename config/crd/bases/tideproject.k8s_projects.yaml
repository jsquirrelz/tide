---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: projects.tideproject.k8s
spec:
  group: tideproject.k8s
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the Schema for the projects API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Project
            properties:
              gates:
                description: Gates declares per-level human gate policy (Phase 4).
                properties:
                  milestone:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  pauseBetweenWaves:
                    type: boolean
                  phase:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  plan:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  task:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                type: object
              modelSelection:
                description: ModelSelection picks per-level model identifiers (Phase
                  2+).
                properties:
                  milestone:
                    type: string
                  phase:
                    type: string
                  plan:
                    type: string
                  task:
                    type: string
                type: object
              secretRefs:
                description: SecretRefs references K8s Secrets for credentials (AUTH-01
                  — Phase 3).
                properties:
                  anthropicAPIKey:
                    description: AnthropicAPIKey is the Secret name carrying the LLM
                      API key.
                    type: string
                  gitCredentials:
                    description: GitCredentials is the Secret name carrying git push
                      credentials (PAT or SSH key).
                    type: string
                type: object
              targetRepo:
                description: TargetRepo is the URL of the repo this Project operates
                  on.
                minLength: 1
                type: string
            required:
            - targetRepo
            type: object
            x-kubernetes-validations:
            - message: targetRepo must be a valid http(s) or SSH git URL
              rule: self.targetRepo.startsWith('http') || self.targetRepo.startsWith('git@')
          status:
            description: status defines the observed state of Project
            properties:
              conditions:
                description: Conditions follow the standard K8s convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: Phase is a high-level state label ("Pending", "Running",
                  "Complete", "Failed").
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
