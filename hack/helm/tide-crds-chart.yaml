apiVersion: v2
name: tide-crds
description: |
  TIDE CustomResourceDefinitions (Project, Milestone, Phase, Plan, Task, Wave)
  as a dedicated Helm subchart per D-E1 / REQ-DIST-01. Splitting the CRDs into
  their own chart lets `helm upgrade tide ...` roll the controller without
  reinstalling or annotating CRDs (the standard Helm anti-pattern around CRD
  storage). Install this chart once per cluster, then install/upgrade the
  sibling `tide` chart as often as needed.
type: application
version: 1.0.6
appVersion: "1.0.6"
