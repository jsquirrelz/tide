# TIDE nightly heavy-integration workflow.
#
# This workflow carries the heavy kind-based test coverage OFF the per-push
# critical path. Per-push CI (.github/workflows/ci.yaml) runs only fast gates
# (Phase 1 verify-* + tide-lint + go vet + TEST-01 unit + Layer A envtest, plus
# helm-lint). The two suites below each spin up a real kind cluster, build
# multiple images, and take ~13-30min — far too slow and flaky for every push,
# so they run nightly on a schedule and on-demand via workflow_dispatch:
#
#   - Layer B kind integration suite (make test-int): the kind tier of TEST-02.
#     Layer A (envtest) already runs per-push in ci.yaml's `test` job.
#   - TIDE's real e2e suite (make test-e2e-kind): the kind_e2e-tagged specs
#     (gate-flow + dashboard + kind-setup). This supersedes the retired
#     kubebuilder-scaffold `-tags=e2e` suite, whose kustomize `make deploy`
#     install was incompatible with TIDE's Helm + /etc/tide/config.yaml +
#     cert-manager webhook model (it CrashLooped).

name: nightly-integration
on:
  schedule:
    # Daily at 07:00 UTC.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  kind-suites:
    name: Heavy kind suites (Layer B integration + kind_e2e e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      # Phase 02.1 / WR-09 / D-03: CI MUST set =1 so install failures fail the
      # build loudly (dev runs leave it unset = soft-skip).
      TIDE_REQUIRE_CONTROLLER: "1"
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install kind v0.31.0
        run: |
          # Failure-6 (nightly-int-flake-timeout, run 26858915802): a bare
          # single-attempt `curl -Lo` against kind.sigs.k8s.io stalled at 0
          # bytes on a transient CDN/redirect blip and failed the whole nightly
          # BEFORE any test ran. Harden the download: --fail (error on HTTP>=400
          # instead of writing an HTML error body to ./kind), retry transient
          # failures (incl. connrefused / all errors), bound the connect, and
          # keep -L for the release redirect. VERSION stays v0.31.0 (STACK.md pin).
          curl -fsSL \
            --retry 5 --retry-delay 3 --retry-all-errors --retry-connrefused \
            --connect-timeout 30 \
            -o ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          # Verify the download is a non-empty binary before installing it.
          test -s ./kind
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          # Post-install smoke (kept): proves the binary is executable + correct version.
          kind version

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.3'

      # go.mod/go.sum tidy check (mirrors the pattern used by other jobs) — fail
      # if `go mod tidy` mutates tracked files.
      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      # Pre-fetch manifests + envtest binaries before the timed test steps.
      - name: Prepare manifests and envtest binaries
        run: |
          make manifests generate fmt vet
          make setup-envtest

      # SC-1 image smoke: verify that core images (tide-push, claude-subagent)
      # do NOT ship the git binary (production transport is pure-Go HTTP/SSH),
      # and that tide-demo-init DOES have git (used to bootstrap the bare repo
      # on demo-remote-pvc). Build all three images fresh from the repo root so
      # the check always reflects the current Dockerfiles, not a pulled registry
      # tag. timeout-minutes: 10 bounds three sequential docker builds on a warm
      # cache (cold first run ~5-7min; subsequent runs ~1-2min per image).
      - name: SC-1 image smoke — verify git presence/absence in core images
        timeout-minutes: 10
        run: |
          set -e
          # Build the three images from the repo root using the canonical Dockerfiles.
          docker build -t ghcr.io/jsquirrelz/tide-push:1.0.0 \
            -f images/tide-push/Dockerfile .
          docker build -t ghcr.io/jsquirrelz/tide-claude-subagent:1.0.0 \
            -f images/claude-subagent/Dockerfile .
          docker build -t ghcr.io/jsquirrelz/tide-demo-init:1.0.0 \
            -f images/tide-demo-init/Dockerfile .

          # SC-1a: tide-push must NOT contain git (pure-Go go-git HTTP/SSH transport).
          # `which git` exits 0 if found; `!` inverts so the step FAILS if git IS found.
          echo "Checking tide-push has no git binary..."
          ! docker run --rm --entrypoint which ghcr.io/jsquirrelz/tide-push:1.0.0 git
          echo "PASS: git absent from tide-push"

          # SC-1b: claude-subagent must NOT contain git.
          echo "Checking claude-subagent has no git binary..."
          ! docker run --rm --entrypoint which ghcr.io/jsquirrelz/tide-claude-subagent:1.0.0 git
          echo "PASS: git absent from claude-subagent"

          # SC-1c: tide-demo-init MUST have git (used to bootstrap the bare repo).
          echo "Checking tide-demo-init has git binary..."
          docker run --rm --entrypoint git ghcr.io/jsquirrelz/tide-demo-init:1.0.0 --version
          echo "PASS: git present in tide-demo-init"

      # Layer B kind integration tier (the kind half of TEST-02). The
      # `timeout 300s` inside `make test-int` bounds only the `go test`
      # invocation; image builds + kind cluster create are unbounded by design.
      # The job-level timeout-minutes: 45 is the genuine ceiling.
      - name: Layer B kind integration suite (make test-int)
        timeout-minutes: 25
        run: |
          set -e
          time make test-int

      # TIDE's real e2e suite — kind_e2e-tagged specs (gate-flow + dashboard +
      # kind-setup) via helm chart install.
      - name: TIDE kind_e2e e2e suite (make test-e2e-kind)
        timeout-minutes: 25
        run: |
          set -e
          time make test-e2e-kind

      # On failure: collect Ginkgo output + kind cluster events for debugging.
      - name: Collect kind cluster logs on failure
        if: failure()
        run: |
          kind export logs /tmp/kind-logs-tide-test --name tide-test 2>/dev/null || true
          echo "=== kubectl get all ==="
          kubectl --context kind-tide-test get all --all-namespaces 2>/dev/null || true
          echo "=== kubectl events ==="
          kubectl --context kind-tide-test get events --all-namespaces --sort-by='.lastTimestamp' 2>/dev/null | tail -50 || true

      - name: Upload kind logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs-nightly-integration
          path: /tmp/kind-logs-tide-test/
          retention-days: 7
