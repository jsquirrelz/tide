# TIDE pricing drift detection workflow (D-03).
#
# Fetches the Anthropic pricing docs page weekly, diffs against the compiled
# priceTable in internal/subagent/anthropic/pricing.go, and opens/updates a
# deduped labeled GitHub issue on drift. No auto-PR — a human reviews billing
# math changes (D-03 mandate: operator must verify every billing-math change
# against the quoted diff before merging).
#
# Exit codes from hack/check-pricing-drift.sh:
#   0 — no drift; no issue opened/updated
#   1 — drift detected; issue opened or updated with the diff body
#   2 — fetch failure; no issue opened (T-14-09: do not report network errors as drift)
#
# Security:
#   T-14-09: diff text is passed to github-script via process.env (env: mapping),
#            never interpolated as ${{ }} inside the JS source string. The issue
#            body is external-origin text (fetched page content) — treat as data,
#            never as code.
#   T-14-10: top-level permissions: {} with job-level contents: read + issues: write
#            only. checkout persist-credentials: false.

name: pricing-drift

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC (weekly, D-03)
  workflow_dispatch:

permissions: {}

jobs:
  check-pricing-drift:
    name: Pricing table drift check (D-03)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write  # needed to open/update the deduped drift issue

    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check pricing drift
        id: drift
        continue-on-error: true
        run: |
          # Capture the script output to a file for use in the issue body.
          # `|| DRIFT_EXIT=$?` (not `|| true; DRIFT_EXIT=$?` — that captures
          # true's exit and is always 0) so non-zero exits survive bash -e.
          DRIFT_EXIT=0
          ./hack/check-pricing-drift.sh > /tmp/drift-output.txt 2>&1 || DRIFT_EXIT=$?
          # Export the exit code and output for subsequent steps.
          echo "exit_code=${DRIFT_EXIT}" >> "$GITHUB_OUTPUT"
          DRIFT_BODY=$(cat /tmp/drift-output.txt)
          # Pass multi-line output via GITHUB_OUTPUT using heredoc delimiter.
          {
            echo 'drift_body<<DRIFT_EOF'
            cat /tmp/drift-output.txt
            echo 'DRIFT_EOF'
          } >> "$GITHUB_OUTPUT"
          # Surface the exit code as outcome for the condition check below.
          # continue-on-error keeps the step green; we inspect exit_code manually.
          exit ${DRIFT_EXIT}

      - name: Open or update drift issue
        # Only when the exit code is exactly 1 (drift detected).
        # Exit code 2 (fetch failure) must NOT open a drift issue (T-14-09).
        # continue-on-error above makes steps.drift.outcome == 'failure' for both
        # exit 1 and exit 2 — so we check the captured exit_code explicitly.
        if: steps.drift.outputs.exit_code == '1'
        uses: actions/github-script@v7
        env:
          # T-14-09: pass the diff text via process.env — never interpolate
          # ${{ steps.drift.outputs.drift_body }} inside the JS source string.
          # The body contains text fetched from an external page; env-mapping
          # ensures it is treated as data, never as executable JS.
          DRIFT_BODY: ${{ steps.drift.outputs.drift_body }}
        with:
          script: |
            const label = 'pricing-drift';
            const title = 'Pricing table drift detected';
            const body = [
              '## Pricing table drift detected',
              '',
              'The compiled `priceTable` in `internal/subagent/anthropic/pricing.go` ',
              'differs from the published Anthropic pricing page.',
              '',
              '**Diff (model · dimension · compiled cents/MTok → live cents/MTok):**',
              '',
              '```',
              process.env.DRIFT_BODY,
              '```',
              '',
              'To fix: update `internal/subagent/anthropic/pricing.go` with the values above.',
              'Run `./hack/check-pricing-drift.sh` locally to verify before tagging.',
              '',
              '> D-03: no auto-PR — a human must review every billing-math change.',
              `> Detected by: ${context.workflow} run [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            // Dedup: search for an existing open issue with the pricing-drift label.
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            if (issues.data.length > 0) {
              // Update the first existing open drift issue.
              const existing = issues.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
              console.log(`Updated existing drift issue #${existing.number}`);
            } else {
              // Create a new drift issue with the pricing-drift label.
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label],
              });
              console.log(`Opened drift issue #${created.data.number}`);
            }
