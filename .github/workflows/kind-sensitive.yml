# TIDE path-gated kind integration workflow.
#
# The heavy Layer B kind suite (make test-int) normally runs only nightly
# (.github/workflows/nightly-integration.yml) because it spins a real kind
# cluster + builds several images (~13-25min) — too slow for every push.
#
# But the classes of change the kind tier actually catches are narrow and
# high-risk: Job dispatch specs, RBAC, PVC provisioning/subPath, and the
# uid-keyed import/export loader paths. Layer A envtest does NOT exercise real
# Jobs, RBAC enforcement, or PVC mounts. So this workflow runs the kind tier
# pre-merge ONLY when a diff touches one of those surfaces — catching a
# regression before it reaches main without paying kind's cost on every push.
#
# Triggers: push to main + pull_request, gated by the `paths:` filter below,
# plus workflow_dispatch for on-demand runs. NOT a required status check (a PR
# that touches no sensitive path simply never starts this run).
#
# NOTE: the two `paths:` lists (push + pull_request) MUST be kept in sync —
# GitHub evaluates them independently per event. Edit both together.

name: kind-sensitive
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # --- Job dispatch / pool ---
      - 'internal/dispatch/**'
      - 'internal/pool/**'
      - 'pkg/dispatch/**'
      # --- Reconcilers that build Jobs / provision PVCs / set subPaths ---
      - 'internal/controller/**'
      # --- RBAC (generated manifests + helmify rbac source) ---
      - 'config/rbac/**'
      - 'config/manager/**'
      - 'hack/helm/*rbac*.yaml'
      - 'hack/helm/*serviceaccount*.yaml'
      - 'charts/**/templates/**'
      # --- PVC / uid-keyed import-export loader paths ---
      - 'cmd/tide-import/**'
      - 'cmd/tide/*envelopes*.go'
      - 'pkg/bundle/**'
      # --- Boundary/artifact push binary the kind suite exercises via real push pods ---
      - 'cmd/tide-push/**'
      # --- Images the kind suite builds + the kind test code itself ---
      - 'images/**'
      - 'test/integration/kind/**'
      - 'test/e2e/**'
      - '.github/workflows/kind-sensitive.yml'
  pull_request:
    paths:
      # KEEP IN SYNC with push.paths above.
      - 'internal/dispatch/**'
      - 'internal/pool/**'
      - 'pkg/dispatch/**'
      - 'internal/controller/**'
      - 'config/rbac/**'
      - 'config/manager/**'
      - 'hack/helm/*rbac*.yaml'
      - 'hack/helm/*serviceaccount*.yaml'
      - 'charts/**/templates/**'
      - 'cmd/tide-import/**'
      - 'cmd/tide/*envelopes*.go'
      - 'pkg/bundle/**'
      - 'cmd/tide-push/**'
      - 'images/**'
      - 'test/integration/kind/**'
      - 'test/e2e/**'
      - '.github/workflows/kind-sensitive.yml'

permissions: {}

jobs:
  kind-layer-b:
    name: Layer B kind suite (gated on Job/RBAC/PVC/uid diffs)
    runs-on: ubuntu-latest
    # v1.0.7: raised 42 → 70 for the grown Layer B suite. The 60m test-int step
    # plus ~5m of prep (checkout/setup-go/kind/helm/manifests) needs headroom
    # above the step cap so the step timeout fires before the job timeout.
    timeout-minutes: 70
    permissions:
      contents: read
    env:
      # WR-09 / D-03: CI MUST set =1 so install failures fail loudly (dev runs
      # leave it unset = soft-skip).
      TIDE_REQUIRE_CONTROLLER: "1"
      # Base dir the in-suite exportKindLogs() writes per-spec subdirs into. The
      # upload step below ships this path. The in-suite export is the only capture
      # that runs while the cluster is still alive — the post-run `kind export logs`
      # step runs after teardown and finds nothing.
      KIND_LOGS_DIR: /tmp/kind-logs-tide-test
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install kind v0.31.0
        run: |
          # Hardened download (mirrors nightly-integration.yml): --fail, retries,
          # bounded connect, -L for the release redirect. Pin per STACK.md.
          curl -fsSL \
            --retry 5 --retry-delay 3 --retry-all-errors --retry-connrefused \
            --connect-timeout 30 \
            -o ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          test -s ./kind
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.3'

      - name: Prepare manifests and envtest binaries
        run: |
          make manifests generate fmt vet
          make setup-envtest

      # Layer B kind integration tier. test-int's internal `timeout` bounds only
      # the go test invocation; image builds + cluster create are bounded by the
      # job-level timeout-minutes.
      # 28 → 35 (PR #3): the Phase 34 fixes make Layer B exercise REAL
      # clone/wave-integration/boundary-push pods for the first time
      # (medium_http spec 3 + the two integration-miss specs), adding a few
      # minutes of genuine end-to-end git work to the green path.
      # 35 → 60 (v1.0.7): Phases 36/37 grew Layer B again — the agent-identity
      # chart spec + the artifact-staging DASH-02 cascade (a live 4-level planner
      # run with a ~12m Eventually tail). The 35m step was killing make test-int
      # mid-suite ~30m in. 60m covers prep + Layer A + the 45m Ginkgo ctx
      # (suite_test.go kindTestTimeout) so the internal timeouts fire loudly
      # before the step does.
      - name: Layer B kind integration suite (make test-int)
        timeout-minutes: 60
        run: |
          set -e
          time make test-int

      - name: Collect kind cluster logs on failure
        if: failure()
        run: |
          kind export logs /tmp/kind-logs-tide-test --name tide-test 2>/dev/null || true
          echo "=== kubectl get all ==="
          kubectl --context kind-tide-test get all --all-namespaces 2>/dev/null || true
          echo "=== kubectl events ==="
          kubectl --context kind-tide-test get events --all-namespaces --sort-by='.lastTimestamp' 2>/dev/null | tail -50 || true

      - name: Upload kind logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs-kind-sensitive
          path: /tmp/kind-logs-tide-test/
          retention-days: 7
