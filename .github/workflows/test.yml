name: Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum  # Phase 04.1 P2.3 — fail if tidy mutated tracked files
          make test

      # `make test` is now UNIT-ONLY (its package selector excludes
      # /test/integration). Preserve Layer A coverage in the Tests job by
      # running the envtest integration tier with -ginkgo.flake-attempts=3
      # (set in the Makefile target) to absorb CI runner CPU contention.
      # Mirrors the TEST-02 step in ci.yaml.
      - name: Layer A envtest integration tier (flake-attempts)
        run: make test-int-fast
