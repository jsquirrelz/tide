# TIDE CI gates.
#
# This workflow enforces Phase 1 + Phase 2 invariants before merge:
#
#   Phase 1 invariants:
#   - DAG-05 (pkg/dag forbidden imports)        — make verify-dag-imports
#   - PERSIST-01 (no DB drivers)                — make verify-no-sqlite-dep
#   - PERSIST-02 / Pitfall 4 (no aggregates)    — make verify-no-aggregates
#   - AUTH-03 / Pitfall 15 (RBAC manifests)     — make verify-no-rbac-wildcards
#   - AUTH-03 (RBAC source markers)             — make verify-rbac-marker-discipline
#   - Pitfall 1 (no blocking I/O in reconcile)  — make verify-no-blocking
#   - POOL-03 / Pitfall 6 (cross-pool waits)    — make tide-lint
#   - TEST-01 (<180s test budget)               — timed make test step
#   - D-E1 / REQ-DIST-01 (chart pair lints)     — helm-lint job
#
#   Phase 2 invariants:
#   - TEST-02 (Layer A envtest tier)            — test job "Layer A envtest" step (make test-int-fast)
#
# Per-push CI runs only fast gates (this workflow's test + helm-lint jobs). The
# heavy Layer B kind integration suite (make test-int) and TIDE's real kind_e2e
# e2e suite (make test-e2e-kind) moved OFF the per-push critical path to the
# nightly workflow (.github/workflows/nightly-integration.yml), which also runs
# on workflow_dispatch for on-demand verification.
#
# Phase 5's distribution work extends this workflow with chart-publish steps.

name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    name: TIDE Phase 1 gates (verify-* + tide-lint + go vet + TEST-01)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # Verification gates run before tests — fast feedback if a marker discipline
      # or contract was broken. Ordered by speed (cheapest grep-based gates first).
      - name: Verify pkg/dag imports (DAG-05)
        run: make verify-dag-imports

      - name: Verify no aggregate schedule fields (PERSIST-02 / Pitfall 4)
        run: make verify-no-aggregates

      - name: Verify no DB drivers (PERSIST-01)
        run: make verify-no-sqlite-dep

      - name: Verify no RBAC wildcards (AUTH-03 / Pitfall 15)
        run: make verify-no-rbac-wildcards

      - name: Verify RBAC marker discipline (AUTH-03)
        run: make verify-rbac-marker-discipline

      - name: Verify no blocking I/O in reconcilers (Pitfall 1)
        run: make verify-no-blocking

      - name: Verify pkg/dispatch imports (SUB-01)
        run: make verify-dispatch-imports

      - name: Verify import firewall (SUB-05 — alias for tide-lint providerfirewall)
        run: make verify-import-firewall

      - name: Run custom analyzers (POOL-03 / Pitfall 6)
        run: make tide-lint

      - name: Verify chart version consistency (release version-skew gate)
        run: make verify-version-consistency

      - name: Verify chart images are in the release matrix (matrix<->chart coverage gate)
        run: make verify-chart-images-published

      - name: go vet
        run: go vet ./...

      # FIX-01: dashboard embed freshness gate.
      # Rebuilds the SPA from dashboard/web/src and fails if cmd/dashboard/embed/dist/
      # is stale — catches a commit that edits dashboard source without regenerating
      # the tracked dist/ tree. Requires Node 22 + npm (same version as Dockerfile.dashboard
      # spa-builder stage). Cache is keyed on the lockfile so npm ci is fast on cache hit.
      - name: Setup Node (dashboard freshness gate)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/web/package-lock.json

      - name: Verify dashboard embed freshness (FIX-01)
        run: make verify-dashboard-freshness

      # Pre-fetch test scaffolding (manifests/generate/fmt/vet/setup-envtest)
      # BEFORE the timed test step so the TEST-01 180s budget measures actual
      # test runtime, not envtest binary download or controller-gen invocation.
      - name: Prepare test environment (manifests + envtest binaries)
        run: |
          make manifests generate fmt vet
          make setup-envtest

      # TEST-01: UNIT tier only, under budget.
      # The `test-only` target runs `go test` WITHOUT re-running manifests/
      # generate/fmt/vet/setup-envtest (those ran in the prep step above), so
      # the budget measures actual test runtime — exactly what TEST-01
      # specifies. The Makefile's test target uses `-short` (skips the slow
      # leader-election spec, Plan 08) and `-timeout 120s` (hung-test protection,
      # separate from this wall-clock budget).
      #
      # UNIT-ONLY: `make test-only` now excludes the test/integration tier
      # (its package selector greps out /test/integration). The envtest
      # integration suite moved to the TEST-02 step below, which runs it via
      # `make test-int-fast` WITH `-ginkgo.flake-attempts=3` to absorb CI
      # runner CPU contention (ResourceVersion-conflict / Eventually-timeout
      # flakes on slow 2-core shared runners). The Ginkgo flake-attempts flag
      # CANNOT live in the mixed `go test ./...` unit run — it breaks
      # non-Ginkgo packages (pkg/dag, analyzers, jobspec_test, stub-subagent)
      # with "flag provided but not defined" — hence the two-tier split.
      #
      # Budget lowered to 120s: with the slow envtest integration tier removed,
      # the unit tier is faster (~34s locally, dominated by the
      # internal/controller Ginkgo envtest *unit* suite which stays here). 120s
      # leaves generous headroom for CI's slow 2-core shared runners without
      # masking a genuine regression. (Was 180s when the integration suite still
      # ran under this step.)
      - name: Unit suite (TEST-01 — UNIT-ONLY, <120s budget)
        run: |
          set -e
          START=$(date +%s)
          make test-only
          END=$(date +%s)
          DUR=$((END - START))
          echo "Test duration: ${DUR}s"
          if [ "$DUR" -gt 120 ]; then
            echo "TEST-01 violation: unit suite exceeded 120s budget (${DUR}s)"
            exit 1
          fi

      # TEST-02 (Layer A): envtest integration tier, moved out of TEST-01.
      # Runs via `make test-int-fast` which passes -ginkgo.flake-attempts=3 so
      # the contention-flaky envtest specs (budget/indegree/init/boundary_push)
      # retry the whole class instead of requiring per-spec timeout bumps on
      # CI's slow 2-core runners. Ginkgo-only package, so the flag is valid.
      # test-int-fast re-runs manifests/generate/fmt/vet/setup-envtest as
      # prereqs; the "Prepare test environment" step above already warmed those.
      - name: Layer A envtest integration tier (TEST-02 — flake-attempts for CI runner contention)
        run: make test-int-fast

  helm-lint:
    name: Helm chart pair lint (D-E1 / REQ-DIST-01)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.3'

      # Regenerate the charts from kubebuilder Kustomize output to verify
      # `make helm` is reproducible — any drift between the committed charts/
      # tree and what helmify+augment produce fails the lint job.
      - name: Regenerate charts via helmify
        run: make helm

      - name: helm lint charts/tide
        run: helm lint charts/tide

      - name: helm lint charts/tide-crds
        run: helm lint charts/tide-crds

      - name: helm template render (smoke test)
        run: |
          helm template ci-test charts/tide --dry-run > /dev/null
          helm template ci-test charts/tide-crds --dry-run > /dev/null

      # Verify the committed chart tree matches a fresh `make helm` regeneration.
      # If a contributor hand-edited charts/ without updating hack/helm/ source-
      # of-truth files, this step catches it.
      - name: Verify chart tree is reproducible
        run: |
          if ! git diff --quiet charts/; then
            echo "charts/ tree drifted from a fresh `make helm` regeneration:"
            git diff --stat charts/
            git diff charts/ | head -100
            exit 1
          fi
          echo "OK: charts/ tree matches fresh helmify+augment output"

      - name: Helm render gate assertions (TELEM-05 D-14)
        run: make helm-assert
