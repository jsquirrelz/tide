# TIDE CI gates.
#
# This workflow enforces Phase 1 + Phase 2 invariants before merge:
#
#   Phase 1 invariants:
#   - DAG-05 (pkg/dag forbidden imports)        — make verify-dag-imports
#   - PERSIST-01 (no DB drivers)                — make verify-no-sqlite-dep
#   - PERSIST-02 / Pitfall 4 (no aggregates)    — make verify-no-aggregates
#   - AUTH-03 / Pitfall 15 (RBAC manifests)     — make verify-no-rbac-wildcards
#   - AUTH-03 (RBAC source markers)             — make verify-rbac-marker-discipline
#   - Pitfall 1 (no blocking I/O in reconcile)  — make verify-no-blocking
#   - POOL-03 / Pitfall 6 (cross-pool waits)    — make tide-lint
#   - TEST-01 (<30s test budget)                — timed make test step
#   - D-E1 / REQ-DIST-01 (chart pair lints)     — helm-lint job
#
#   Phase 2 invariants:
#   - TEST-02 (integration test tier <5min)     — test-int job (make test-int, timeout 300s)
#
# Phase 5's distribution work extends this workflow with chart-publish steps.

name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    name: TIDE Phase 1 gates (verify-* + tide-lint + go vet + TEST-01)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # Verification gates run before tests — fast feedback if a marker discipline
      # or contract was broken. Ordered by speed (cheapest grep-based gates first).
      - name: Verify pkg/dag imports (DAG-05)
        run: make verify-dag-imports

      - name: Verify no aggregate schedule fields (PERSIST-02 / Pitfall 4)
        run: make verify-no-aggregates

      - name: Verify no DB drivers (PERSIST-01)
        run: make verify-no-sqlite-dep

      - name: Verify no RBAC wildcards (AUTH-03 / Pitfall 15)
        run: make verify-no-rbac-wildcards

      - name: Verify RBAC marker discipline (AUTH-03)
        run: make verify-rbac-marker-discipline

      - name: Verify no blocking I/O in reconcilers (Pitfall 1)
        run: make verify-no-blocking

      - name: Run custom analyzers (POOL-03 / Pitfall 6)
        run: make tide-lint

      - name: go vet
        run: go vet ./...

      # Pre-fetch test scaffolding (manifests/generate/fmt/vet/setup-envtest)
      # BEFORE the timed test step so the TEST-01 30s budget measures actual
      # test runtime, not envtest binary download or controller-gen invocation.
      - name: Prepare test environment (manifests + envtest binaries)
        run: |
          make manifests generate fmt vet
          make setup-envtest

      # TEST-01: full unit + envtest suite under 30s.
      # The `test-only` target runs `go test` WITHOUT re-running manifests/
      # generate/fmt/vet/setup-envtest (those ran in the prep step above), so
      # the 30s budget measures actual test runtime — exactly what TEST-01
      # specifies. The Makefile's test target uses `-short` (skips the slow
      # leader-election spec, Plan 08) and `-timeout 60s` (hung-test protection,
      # separate from this wall-clock budget).
      - name: Unit + envtest suite (TEST-01 — <30s budget)
        run: |
          set -e
          START=$(date +%s)
          make test-only
          END=$(date +%s)
          DUR=$((END - START))
          echo "Test duration: ${DUR}s"
          if [ "$DUR" -gt 30 ]; then
            echo "TEST-01 violation: test suite exceeded 30s budget (${DUR}s)"
            exit 1
          fi

  helm-lint:
    name: Helm chart pair lint (D-E1 / REQ-DIST-01)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.3'

      # Regenerate the charts from kubebuilder Kustomize output to verify
      # `make helm` is reproducible — any drift between the committed charts/
      # tree and what helmify+augment produce fails the lint job.
      - name: Regenerate charts via helmify
        run: make helm

      - name: helm lint charts/tide
        run: helm lint charts/tide

      - name: helm lint charts/tide-crds
        run: helm lint charts/tide-crds

      - name: helm template render (smoke test)
        run: |
          helm template ci-test charts/tide --dry-run > /dev/null
          helm template ci-test charts/tide-crds --dry-run > /dev/null

      # Verify the committed chart tree matches a fresh `make helm` regeneration.
      # If a contributor hand-edited charts/ without updating hack/helm/ source-
      # of-truth files, this step catches it.
      - name: Verify chart tree is reproducible
        run: |
          if ! git diff --quiet charts/; then
            echo "charts/ tree drifted from a fresh `make helm` regeneration:"
            git diff --stat charts/
            git diff charts/ | head -100
            exit 1
          fi
          echo "OK: charts/ tree matches fresh helmify+augment output"

  test-int:
    name: Integration test suite (TEST-02 — Layer A envtest + Layer B kind, <5min)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install kind v0.31.0
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # Pre-fetch manifests + envtest binaries before the timed test-int step.
      - name: Prepare manifests and envtest binaries
        run: |
          make manifests generate fmt vet
          make setup-envtest

      # TEST-02: integration test suite (Layer A + Layer B).
      # Layer A (envtest) runs always; Layer B (kind) runs in CI.
      # The `timeout 300s` inside `make test-int` enforces the budget.
      # The outer `timeout-minutes: 6` is the CI fence.
      - name: Integration test suite (TEST-02 — make test-int)
        run: |
          set -e
          START=$(date +%s)
          time make test-int
          END=$(date +%s)
          DUR=$((END - START))
          echo "Integration test duration: ${DUR}s"
          if [ "$DUR" -gt 300 ]; then
            echo "TEST-02 violation: integration suite exceeded 300s budget (${DUR}s)"
            exit 1
          fi

      # On failure: collect Ginkgo output + kind cluster events for debugging.
      - name: Collect kind cluster logs on failure
        if: failure()
        run: |
          kind export logs /tmp/kind-logs-tide-test --name tide-test 2>/dev/null || true
          echo "=== kubectl get all ==="
          kubectl --context kind-tide-test get all --all-namespaces 2>/dev/null || true
          echo "=== kubectl events ==="
          kubectl --context kind-tide-test get events --all-namespaces --sort-by='.lastTimestamp' 2>/dev/null | tail -50 || true

      - name: Upload kind logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs-test-int
          path: /tmp/kind-logs-tide-test/
          retention-days: 7
