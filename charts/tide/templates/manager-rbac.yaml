apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tide.fullname" . }}-manager-role
  labels:
  {{- include "tide.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - tideproject.k8s
  resources:
  - milestones
  - phases
  - plans
  - projects
  - tasks
  - waves
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tideproject.k8s
  resources:
  - milestones/finalizers
  - phases/finalizers
  - plans/finalizers
  - projects/finalizers
  - tasks/finalizers
  - waves/finalizers
  verbs:
  - update
- apiGroups:
  - tideproject.k8s
  resources:
  - milestones/status
  - phases/status
  - plans/status
  - projects/status
  - tasks/status
  - waves/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tide.fullname" . }}-manager-rolebinding
  labels:
  {{- include "tide.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "tide.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "tide.fullname" . }}-controller-manager'
  namespace: '{{ .Release.Namespace }}'