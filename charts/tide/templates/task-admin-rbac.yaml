apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tide.fullname" . }}-task-admin-role
  labels:
  {{- include "tide.labels" . | nindent 4 }}
rules:
- apiGroups:
  - tideproject.k8s
  resources:
  - tasks
  verbs:
  - '*'
- apiGroups:
  - tideproject.k8s
  resources:
  - tasks/status
  verbs:
  - get