apiVersion: v1
kind: ServiceAccount
metadata:
  name: tide-import
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tide.labels" . | nindent 4 }}
automountServiceAccountToken: true
# No Role, no RoleBinding — the tide-import Job binary does pure filesystem I/O on
# the per-namespace PVC (copy + UID-rekey of envelope trees); it makes zero K8s API
# calls (import_jobspec.go: "No ServiceAccount token needed"). The Job pod still
# references this SA by name, so it must exist or the Job controller refuses to
# create the pod (Phase 28 / Phase 29 GAP-5). Mirrors serviceaccount-subagent.yaml.
