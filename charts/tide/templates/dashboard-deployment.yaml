{{- if .Values.dashboard.enabled }}
# Dashboard Deployment (Phase 4 D-D2 / D-X3).
#
# Stateless read-only replica. Browser ↔ this Pod (HTTP + SSE on :8080);
# Pod ↔ apiserver via controller-runtime client. LeaderElection: false.
# The dashboard SA (templates/dashboard-rbac.yaml) carries only
# {get, list, watch} verbs on TIDE CRDs and pods/log — enforced by
# `make helm-rbac-assert`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tide.fullname" . }}-dashboard
  labels:
    control-plane: dashboard
  {{- include "tide.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tide-dashboard
      control-plane: dashboard
    {{- include "tide.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tide-dashboard
        control-plane: dashboard
      {{- include "tide.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: dashboard
    spec:
      serviceAccountName: {{ include "tide.fullname" . }}-dashboard
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: dashboard
        image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.dashboard.image.pullPolicy | default "IfNotPresent" }}
        command:
        - /dashboard
        args:
        - --api-bind-address=:8080
        - --health-probe-bind-address=:8081
        env:
        # OTel env vars — read by internal/otelinit at boot (Phase 4 plan 04-03).
        # Empty OTEL_EXPORTER_OTLP_ENDPOINT → no-op TracerProvider (zero overhead).
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ quote .Values.otel.exporter.endpoint }}
        - name: OTEL_TRACES_SAMPLER
          value: {{ quote .Values.otel.tracesSampler }}
        - name: OTEL_TRACES_SAMPLER_ARG
          value: {{ quote .Values.otel.tracesSamplerArg }}
        - name: OTEL_SERVICE_NAME
          value: "tide-dashboard"
        # PromQL proxy target (Phase 04 plan 02). Read by internal/config as the
        # PROM_ENDPOINT override; drives the dashboard's /api/v1/query{,_range}
        # proxy handlers. Emitted ONLY when prometheus.endpoint is non-empty; the
        # empty default renders no env, so the proxy self-degrades to the
        # {"status":"unavailable"} sentinel without error.
        {{- if .Values.prometheus.endpoint }}
        - name: PROM_ENDPOINT
          value: {{ quote .Values.prometheus.endpoint }}
        {{- end }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        # liveness: process is alive even before informer cache sync
        # (kubelet uses this to distinguish "starting" from "deadlocked").
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        # readiness: gated on informer cache sync — kubelet only routes
        # traffic to the Pod once the cache is hot (cmd/dashboard/main.go
        # cacheSyncHealthz).
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.dashboard.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      terminationGracePeriodSeconds: 10
{{- end }}
