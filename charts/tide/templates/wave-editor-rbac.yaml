apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tide.fullname" . }}-wave-editor-role
  labels:
  {{- include "tide.labels" . | nindent 4 }}
rules:
- apiGroups:
  - tideproject.k8s
  resources:
  - waves
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tideproject.k8s
  resources:
  - waves/status
  verbs:
  - get