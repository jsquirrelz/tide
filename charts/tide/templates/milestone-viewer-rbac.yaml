apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tide.fullname" . }}-milestone-viewer-role
  labels:
  {{- include "tide.labels" . | nindent 4 }}
rules:
- apiGroups:
  - tideproject.k8s
  resources:
  - milestones
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - tideproject.k8s
  resources:
  - milestones/status
  verbs:
  - get