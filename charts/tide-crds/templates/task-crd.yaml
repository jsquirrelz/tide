apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tasks.tideproject.k8s
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    helm.sh/resource-policy: keep
  labels:
  {{- include "tide-crds.labels" . | nindent 4 }}
spec:
  group: tideproject.k8s
  names:
    kind: Task
    listKind: TaskList
    plural: tasks
    singular: task
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Task is the Schema for the tasks API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Task
            properties:
              caps:
                description: Caps optionally restricts subagent resource usage (Phase
                  2+).
                properties:
                  inputTokens:
                    description: InputTokens caps the number of input (prompt) tokens
                      consumed per dispatch.
                    format: int64
                    minimum: 0
                    type: integer
                  iterations:
                    description: Iterations caps the number of agentic iterations (tool-call
                      loops).
                    format: int32
                    minimum: 1
                    type: integer
                  outputTokens:
                    description: OutputTokens caps the number of output (completion)
                      tokens produced per dispatch.
                    format: int64
                    minimum: 0
                    type: integer
                  wallClockSeconds:
                    description: WallClockSeconds is the maximum wall-clock time for
                      the subagent execution.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              declaredOutputPaths:
                description: |-
                  DeclaredOutputPaths declares the output artifact paths the subagent must produce
                  (Phase 2+). Plan 06's harness output validator enforces against this set (HARN-05).
                items:
                  type: string
                minItems: 1
                type: array
              dependsOn:
                description: DependsOn lists sibling Task names in the same Plan (D-F1).
                items:
                  type: string
                type: array
              dev:
                description: |-
                  Dev carries dev/test-only overrides for the stub subagent (Phase 2+).
                  Zero-value embed (not pointer) — field presence is governed by the TestMode
                  enum constraint, mirroring the Gates pattern in shared_types.go.
                properties:
                  testMode:
                    description: |-
                      TestMode overrides the stub subagent's exit behaviour (used by integration tests).
                      The wait-for-signal mode (Phase 3 D-D3) pins the stub at Running until the
                      orchestrator touches /workspace/envelopes/{task-uid}/release — required by
                      the chaos-resume Layer B spec to observe mid-wave leader handoff. See
                      cmd/stub-subagent/main.go:dispatchWaitForSignal for the polling contract.
                    enum:
                    - success
                    - fail-exit-1
                    - hang
                    - exceed-output-paths
                    - wait-for-signal
                    type: string
                type: object
              filesTouched:
                description: FilesTouched declares the workspace paths this Task intends
                  to write (D-F2).
                items:
                  type: string
                minItems: 1
                type: array
              planRef:
                description: PlanRef is the name of the owning Plan (same namespace).
                minLength: 1
                type: string
              promptPath:
                description: |-
                  PromptPath is the PVC-relative path (under the per-Project workspace root)
                  to the durable children/task-NN.json artifact this Task was materialized
                  from. The executor instruction lives at .spec.prompt inside that file; the
                  controller reads it FRESH from the PVC on every dispatch (buildEnvelopeIn →
                  EnvelopeIn.Prompt). Editing the children file and re-dispatching re-applies
                  the edit with nothing to clobber — the file is the source of truth, not a
                  cached CRD body. The materializer always sets this; a Task without it is
                  undispatchable, so it is required at the API boundary (MinLength=1).
  
                  Path is workspace-relative (e.g. "envelopes/<plannerUID>/children/task-01.json")
                  so it resolves under both the controller PVC mount and the executor pod mount.
                minLength: 1
                type: string
            required:
            - declaredOutputPaths
            - filesTouched
            - planRef
            - promptPath
            type: object
          status:
            description: status defines the observed state of Task
            properties:
              attempt:
                type: integer
              completedAt:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              exitCode:
                type: integer
              phase:
                type: string
              startedAt:
                description: |-
                  StartedAt is the wall-clock time the reconciler dispatched the Job for this
                  Task. Used by handleJobCompletion to anchor the output-path validation time
                  window (Warning #5 / HARN-05).
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []
