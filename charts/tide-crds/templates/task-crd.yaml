apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tasks.tideproject.k8s
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    helm.sh/resource-policy: keep
  labels:
  {{- include "tide-crds.labels" . | nindent 4 }}
spec:
  group: tideproject.k8s
  names:
    kind: Task
    listKind: TaskList
    plural: tasks
    singular: task
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: Task is the Schema for the tasks API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Task
            properties:
              caps:
                description: Caps optionally restricts subagent resource usage (Phase
                  2+).
                properties:
                  inputTokens:
                    description: InputTokens caps the number of input (prompt) tokens
                      consumed per dispatch.
                    format: int64
                    minimum: 0
                    type: integer
                  iterations:
                    description: Iterations caps the number of agentic iterations (tool-call
                      loops).
                    format: int32
                    minimum: 1
                    type: integer
                  outputTokens:
                    description: OutputTokens caps the number of output (completion)
                      tokens produced per dispatch.
                    format: int64
                    minimum: 0
                    type: integer
                  wallClockSeconds:
                    description: WallClockSeconds is the maximum wall-clock time for
                      the subagent execution.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              declaredOutputPaths:
                description: |-
                  DeclaredOutputPaths declares the output artifact paths the subagent must produce
                  (Phase 2+). Plan 06's harness output validator enforces against this set (HARN-05).
                items:
                  type: string
                minItems: 1
                type: array
              dependsOn:
                description: |-
                  DependsOn lists the names of Tasks (or Plan/Phase/Milestone scope nodes)
                  in any Plan/Phase/Milestone of this Project that must complete before this
                  Task may dispatch. D-F1 (plan-local restriction) is retired — entries may
                  target Tasks in any Plan, any Phase, or any Milestone within this Project.
                  Coarse scope refs (naming a Plan/Phase/Milestone rather than a Task) are
                  fan-out expanded by the Phase 24 assembler (DEPS-02). Resolved in-memory
                  at assembly time (D-05); authored coarse dependsOn is the only persisted
                  truth.
                items:
                  minLength: 1
                  type: string
                type: array
                x-kubernetes-validations:
                - message: dependsOn entries must not be empty strings
                  rule: '!self.exists(d, d == '''')'
              dev:
                description: |-
                  Dev carries dev/test-only overrides for the stub subagent (Phase 2+).
                  Zero-value embed (not pointer) — field presence is governed by the TestMode
                  enum constraint, mirroring the Gates pattern in shared_types.go.
                properties:
                  testMode:
                    description: |-
                      TestMode overrides the stub subagent's exit behaviour (used by integration tests).
                      The wait-for-signal mode (Phase 3 D-D3) pins the stub at Running until the
                      orchestrator touches /workspace/envelopes/{task-uid}/release — required by
                      the chaos-resume Layer B spec to observe mid-wave leader handoff. See
                      cmd/stub-subagent/main.go:dispatchWaitForSignal for the polling contract.
                    enum:
                    - success
                    - fail-exit-1
                    - hang
                    - exceed-output-paths
                    - wait-for-signal
                    type: string
                type: object
              filesTouched:
                description: FilesTouched declares the workspace paths this Task intends
                  to write (D-F2).
                items:
                  type: string
                minItems: 1
                type: array
              gates:
                description: |-
                  Gates declares per-level gate policy for this Task (Phase 25 DISP-03).
                  When Gates.Task == "approve", the task controller parks this Task at
                  AwaitingApproval after its global indegree reaches 0 — implementing the
                  task-level approve gate that composes with global dispatch readiness.
                  Default (zero-value) is "auto" (no hold). Mirrors the Gates pattern on
                  ProjectSpec; the Task-level field takes precedence over the Project-level
                  Project.Spec.Gates.Task when evaluating task gate policy.
                properties:
                  milestone:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  pauseBetweenWaves:
                    type: boolean
                  phase:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  plan:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  task:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                type: object
              planRef:
                description: |-
                  PlanRef is the name of the owning Plan (same namespace). Used for
                  ownership and Task listing; NOT a dep constraint.
                minLength: 1
                type: string
              promptPath:
                description: |-
                  PromptPath is the PVC-relative path (under the per-Project workspace root)
                  to the durable children/task-NN.json artifact this Task was materialized
                  from. The executor instruction lives at .spec.prompt inside that file; the
                  controller reads it FRESH from the PVC on every dispatch (buildEnvelopeIn →
                  EnvelopeIn.Prompt). Editing the children file and re-dispatching re-applies
                  the edit with nothing to clobber — the file is the source of truth, not a
                  cached CRD body. The materializer always sets this; a Task without it is
                  undispatchable, so it is required at the API boundary (MinLength=1).
  
                  Path is workspace-relative (e.g. "envelopes/<plannerUID>/children/task-01.json")
                  so it resolves under both the controller PVC mount and the executor pod mount.
                minLength: 1
                type: string
              sharedContext:
                description: |-
                  SharedContext is the wave-scoped shared context string stamped by the
                  orchestrator at Task creation time (Phase 20 D-05). Populated from the
                  parent planner's EnvelopeOut.SharedContext; byte-identical across all
                  Tasks in the same wave. The dispatcher reads this at Task dispatch time
                  and places it in EnvelopeIn.SharedContext (D-07).
                  Empty for Tasks authored before Phase 20 or where the parent planner
                  emitted no SharedContext; omitempty keeps older CRD objects small.
                type: string
              verification:
                description: |-
                  Verification declares the planner-authored, immutable-once-locked
                  pass-criteria contract for this Task (Phase 51 TASK-01). Mirrors the
                  Gates precedence-doc pattern: Task-scoped only in this phase; the
                  identical VerificationSpec shape generalizes to Plan.Spec/
                  Project.Spec with a Task > Plan > Project precedence in Phase 52.
                properties:
                  commands:
                    description: |-
                      Commands lists additional acceptance-signal commands beyond
                      GateCommand. Plan 06 resolves this list onto the transported
                      VerifyContext.Commands list; the Plan 02 verifier executes EACH
                      command out-of-band (exit codes parsed, any non-zero dominates any
                      LLM APPROVED — TASK-04). Not decorative.
                    items:
                      type: string
                    type: array
                  evaluator:
                    description: |-
                      Evaluator names the evaluator config this verification contract
                      resolves against (same-namespace name ref, plain string — not
                      corev1.LocalObjectReference).
                    type: string
                  gateCommand:
                    description: |-
                      GateCommand is the single canonical primary pass-criterion command —
                      resolves onto pkg/dispatch.VerifyContext.GateCommand at verifier
                      dispatch time (Plan 06). This is planner-authored data EXECUTED FOR
                      REAL downstream, NOT decorative/status text: the independent verifier
                      runs it and parses the exit code (TASK-04); a non-zero exit dominates
                      any LLM judge's APPROVED verdict.
                    type: string
                  maxIterations:
                    description: |-
                      MaxIterations bounds the Task loop's repeat policy: the maximum
                      number of evaluator-driven fresh attempts the loop may dispatch
                      before halting (D-07/TASK-05).
                    format: int32
                    minimum: 0
                    type: integer
                  onExhaustion:
                    description: |-
                      OnExhaustion declares the bounded exit path once MaxIterations is
                      reached without an APPROVED evaluation. In Phase 51 BOTH enum values
                      resolve IDENTICALLY to ConditionVerifyHalt + await `tide resume` —
                      per-value differentiation (a future LoopPolicy.EscalationPolicy) is
                      Phase 52 scope. Declared-but-uniform-now, never unenforced: both
                      values halt dispatch today.
                    enum:
                    - escalate
                    - requireApproval
                    type: string
                  phase:
                    description: |-
                      Phase is the lifecycle state governing immutability: Draft is freely
                      editable, Locked is immutable except for a Locked->Superseded
                      transition (which mints a new version to carry further edits),
                      Superseded is a terminal historical record. Transition rules are
                      skipped on CREATE (no oldSelf) — a Draft-at-create is unconstrained.
                    enum:
                    - Draft
                    - Locked
                    - Superseded
                    type: string
                  requiredArtifacts:
                    description: |-
                      RequiredArtifacts lists workspace-relative paths the verifier
                      confirms exist.
                    items:
                      type: string
                    type: array
                  version:
                    description: |-
                      Version is the monotonic version number, incremented each time a
                      Locked contract is superseded by a new Draft.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
                x-kubernetes-validations:
                - message: verification is immutable once Locked; supersede to a new
                    version to change it
                  rule: oldSelf.phase != 'Locked' || self == oldSelf || self.phase ==
                    'Superseded'
            required:
            - declaredOutputPaths
            - filesTouched
            - planRef
            - promptPath
            type: object
          status:
            description: status defines the observed state of Task
            properties:
              attempt:
                type: integer
              completedAt:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              exitCode:
                type: integer
              lastAttemptEvidence:
                description: |-
                  LastAttemptEvidence is the compact, current-iteration-only run-evidence
                  projection captured at the most recent executor completion (Phase 51
                  BL-01). It carries the EXECUTOR's changed-file manifest + commands — data
                  the verifier's read-only envelope never writes — so the anti-gaming
                  detector's belt-and-suspenders (repairOrHalt, TASK-06) and the repair
                  evidence packet (stageEvidencePacket, TASK-02) can read it after the
                  executor's out.json has been overwritten by the verifier's verdict-only
                  envelope. Overwritten every attempt (LOOP-03 — no history) and bounded
                  (PERSIST-02).
                properties:
                  changedFiles:
                    description: |-
                      ChangedFiles is the bounded git --name-status manifest the executor
                      produced for the most recent attempt.
                    items:
                      description: |-
                        ChangedFileRef is the api-local mirror of pkg/dispatch.ChangedFile — a
                        single git --name-status pair (path + status letter). api/v1alpha3 stays
                        free of a pkg/dispatch import (the import firewall), so the wire type is
                        mirrored here, exactly as EvaluationSummary mirrors pkg/dispatch.GateDecision
                        (loop_types.go's own two-homes design note).
                      properties:
                        path:
                          description: Path is the repo-relative path of the changed
                            file.
                          type: string
                        status:
                          description: |-
                            Status is the git name-status letter: A (added), M (modified),
                            D (deleted), R (renamed), etc.
                          type: string
                      type: object
                    type: array
                  commands:
                    description: Commands is the bounded list of command lines the executor
                      ran.
                    items:
                      type: string
                    type: array
                type: object
              lockedSHA:
                description: |-
                  LockedSHA is the commit SHA of spec.verification at the moment it was
                  last transitioned to Locked — a runtime OBSERVATION recorded at
                  dispatch, not the governing enum (which lives on
                  spec.verification.phase/version per RESEARCH Pitfall 2 / Open
                  Question 1). `git show <lockedSHA>` reproduces exactly the contract a
                  dispatched attempt ran against (TASK-01 repudiation guard).
                type: string
              loopStatus:
                description: |-
                  LoopStatus carries the Task loop's current-iteration summary + exit
                  reason only (Phase 51 D-07/LOOP-03 — no accumulating iteration
                  history; see TestLoopStatus_NoForbiddenFields). Re-derivable across a
                  restart from Attempt above + the completed-set, never a cache of
                  iteration history.
                properties:
                  conditions:
                    items:
                      description: Condition contains details for one aspect of the
                        current state of this API Resource.
                      properties:
                        lastTransitionTime:
                          description: |-
                            lastTransitionTime is the last time the condition transitioned from one status to another.
                            This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                          format: date-time
                          type: string
                        message:
                          description: |-
                            message is a human readable message indicating details about the transition.
                            This may be an empty string.
                          maxLength: 32768
                          type: string
                        observedGeneration:
                          description: |-
                            observedGeneration represents the .metadata.generation that the condition was set based upon.
                            For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                            with respect to the current state of the instance.
                          format: int64
                          minimum: 0
                          type: integer
                        reason:
                          description: |-
                            reason contains a programmatic identifier indicating the reason for the condition's last transition.
                            Producers of specific condition types may define expected values and meanings for this field,
                            and whether the values are considered a guaranteed API.
                            The value should be a CamelCase string.
                            This field may not be empty.
                          maxLength: 1024
                          minLength: 1
                          pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                          type: string
                        status:
                          description: status of the condition, one of True, False,
                            Unknown.
                          enum:
                          - "True"
                          - "False"
                          - Unknown
                          type: string
                        type:
                          description: type of condition in CamelCase or in foo.example.com/CamelCase.
                          maxLength: 316
                          pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                          type: string
                      required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - type
                    x-kubernetes-list-type: map
                  costCents:
                    description: |-
                      CostCents is the cumulative spend (USD cents) across all iterations
                      of this loop so far, checked against LoopPolicy.BudgetCents.
                    format: int64
                    minimum: 0
                    type: integer
                  exitReason:
                    description: |-
                      ExitReason records the bounded exit/escalation outcome once the loop
                      has stopped iterating (empty while the loop is still active).
                    enum:
                    - approved
                    - iterationsExhausted
                    - durationExhausted
                    - budgetExhausted
                    - escalated
                    type: string
                  iteration:
                    description: |-
                      Iteration is the current attempt number (1-indexed once dispatched;
                      0 before the loop's first iteration).
                    format: int32
                    minimum: 0
                    type: integer
                  lastEvaluation:
                    description: |-
                      LastEvaluation is the bounded verdict summary from the most recent
                      evaluator/environment feedback — current-iteration only, never a
                      slice/history of past evaluations (LOOP-03).
                    properties:
                      completedAt:
                        description: CompletedAt is when the evaluator produced this
                          verdict.
                        format: date-time
                        type: string
                      decision:
                        description: |-
                          Decision is the locally-scoped verdict string ("APPROVED",
                          "REPAIRABLE", or "BLOCKED") — never the imported pkg/dispatch.GateDecision
                          type, per the two-homes design note above.
                        enum:
                        - APPROVED
                        - REPAIRABLE
                        - BLOCKED
                        type: string
                      findingsCount:
                        description: |-
                          FindingsCount is the total number of findings the evaluator reported,
                          without the findings[] array itself.
                        format: int32
                        minimum: 0
                        type: integer
                      highSeverityCount:
                        description: |-
                          HighSeverityCount is the number of findings at the highest severity
                          tier the evaluator reported.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                  parentRunID:
                    description: |-
                      ParentRunID identifies the run that produced the mutable candidate
                      this LoopStatus is evaluating, correlating LoopStatus back to the
                      trace/artifact history where iteration-by-iteration detail lives
                      (LOOP-03 — that detail is never duplicated into `.status`).
                    type: string
                type: object
              phase:
                type: string
              startedAt:
                description: |-
                  StartedAt is the wall-clock time the reconciler dispatched the Job for this
                  Task. Used by handleJobCompletion to anchor the output-path validation time
                  window (Warning #5 / HARN-05).
                format: date-time
                type: string
              taskSpanEmittedUID:
                description: |-
                  TaskSpanEmittedUID is the UID of the executor Job whose completion has
                  already had its dispatch span synthesized. Mirrors {Level}SpanEmittedUID
                  on the four planner-level Status structs (Phase 43 TRACE-01).
                type: string
              taskTraceReporterSpawnedUID:
                description: |-
                  TaskTraceReporterSpawnedUID is the UID of the completed executor Job whose
                  trace-only reporter Job has been spawned for this Task attempt — the
                  durable gate closing the CR-01 window where the name-only spawn gate in
                  spawnTaskTraceReporterIfNeeded re-opens after the reporter Job's 300s
                  TTL-GC and a sustained-reconcile parent re-Creates a duplicate reporter
                  with recomputed options (Phase 47 gap-closure; mirrors TaskSpanEmittedUID's
                  per-attempt keying). The value is the completed Job's UID — Task always
                  observes a non-nil completedJob at this call site, so there is no
                  name-fallback branch here (unlike the four planner-level markers).
                type: string
              taskTraceSpanID:
                description: |-
                  TaskTraceSpanID is the OTel SpanID of this Task's own synthesized span,
                  persisted for Phase 46's dashboard deep-link (OBS-04). Never store the
                  TraceID — always re-derivable from Project.UID via otelai.TraceIDFromUID.
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: a task cannot depend on itself
          rule: '!has(self.spec.dependsOn) || !(self.metadata.name in self.spec.dependsOn)'
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []
