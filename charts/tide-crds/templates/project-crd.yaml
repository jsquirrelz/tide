                          "REPAIRABLE", or "BLOCKED") — never the imported pkg/dispatch.GateDecision
                          type, per the two-homes design note above.
                        enum:
                        - APPROVED
                        - REPAIRABLE
                        - BLOCKED
                        type: string
                      findingsCount:
                        description: |-
                          FindingsCount is the total number of findings the evaluator reported,
                          without the findings[] array itself.
                        format: int32
                        minimum: 0
                        type: integer
                      highSeverityCount:
                        description: |-
                          HighSeverityCount is the number of findings at the highest severity
                          tier the evaluator reported.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                  parentRunID:
                    description: |-
                      ParentRunID identifies the run that produced the mutable candidate
                      this LoopStatus is evaluating, correlating LoopStatus back to the
                      trace/artifact history where iteration-by-iteration detail lives
                      (LOOP-03 — that detail is never duplicated into `.status`).
                    type: string
                type: object
              phase:
                description: Phase is a high-level state label ("Pending", "Running",
                  "Complete", "Failed").
                type: string
              plannerSpanEmittedUID:
                description: |-
                  PlannerSpanEmittedUID is the UID of the planner Job whose completion has
                  already had its dispatch span synthesized. Gates one-span-per-Job-attempt
                  emission INDEPENDENT of envReadOK — deliberately not reusing
                  Budget.PlannerRolledUpUID, whose envReadOK gating would re-emit degraded
                  spans on every reconcile (Pitfall 2). Keyed by Job UID, not name: planner
                  Job names are deterministic, so a deleted-and-recreated attempt reuses the
                  name but never the UID (D-02: each retry attempt produces its own span).
                  Placed directly on ProjectStatus (NOT Budget-nested): budget rollup is
                  cost bookkeeping, span emission is telemetry bookkeeping with no budget
                  relationship. Phase 42 D-02/D-04.
                type: string
              projectReporterSpawnedUID:
                description: |-
                  ProjectReporterSpawnedUID is the UID of the completed planner Job whose
                  reporter Job has been spawned for this level — the durable gate closing
                  the CR-01 window where the name-only spawn gate re-opens after the
                  reporter Job's 300s TTL-GC and a sustained-reconcile parent re-Creates a
                  duplicate reporter with recomputed options (Phase 47 gap-closure; mirrors
                  Budget.PlannerRolledUpUID's role for budget rollup). Placed directly on
                  ProjectStatus (NOT Budget-nested), mirroring PlannerSpanEmittedUID's
                  placement: spawn identity is telemetry bookkeeping with no budget
                  relationship. The value is the completed Job's UID, falling back to the
                  deterministic planner-Job name when the caller observes a nil Job object.
                type: string
              projectTraceSpanID:
                description: |-
                  ProjectTraceSpanID is this level's own synthesized dispatch-span OTel
                  SpanID hex, persisted as the durable parent carrier for child-level
                  spans and Phase 46's dashboard deep-link (Phase 43 PROP-02). Never
                  stores the TraceID — always re-derivable from Project.UID via
                  otelai.TraceIDFromUID (D-03/D-04). Placed directly on ProjectStatus
                  (NOT Budget-nested), mirroring PlannerSpanEmittedUID's placement: span
                  identity is telemetry bookkeeping with no budget relationship.
                type: string
            type: object
        required:
        - spec
        type: object
