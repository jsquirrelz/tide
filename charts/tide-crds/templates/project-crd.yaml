apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.tideproject.k8s
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    helm.sh/resource-policy: keep
  labels:
  {{- include "tide-crds.labels" . | nindent 4 }}
spec:
  group: tideproject.k8s
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: Project is the Schema for the projects API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Project
            properties:
              budget:
                description: Budget declares cost/token caps for this project (Phase
                  2+).
                properties:
                  absoluteCapCents:
                    description: AbsoluteCapCents is the hard spending limit in USD
                      cents for the project lifetime.
                    format: int64
                    minimum: 0
                    type: integer
                  rollingWindowCapCents:
                    description: |-
                      RollingWindowCapCents caps spending over the rolling window defined by
                      BudgetStatus.WindowStart and BudgetConfig.RollingWindowDuration. When
                      the window elapses, ProjectReconciler.handleBudgetGate resets
                      CostSpentCents + TokensSpent and advances WindowStart.
                    format: int64
                    type: integer
                  rollingWindowDuration:
                    description: |-
                      RollingWindowDuration is the window length over which
                      RollingWindowCapCents applies. Default: 24h when unset. Must be >= 1h
                      to prevent inadvertent denial-of-dispatch via tiny windows.
                      Validation: enforced semantically in ProjectReconciler (metav1.Duration
                      is a struct; controller-gen Pattern markers require a string type).
                    type: string
                required:
                - absoluteCapCents
                type: object
              failureProfile:
                allOf:
                - enum:
                  - strict
                  - conservative
                - enum:
                  - strict
                  - conservative
                default: strict
                description: |-
                  FailureProfile controls how a task execution failure affects non-dependent
                  work in later waves. strict (default): non-dependents continue dispatching
                  (enforced automatically by the indegree model — a failed task never reaches
                  Succeeded, so only its dependents are blocked). conservative: first failure
                  stamps ConditionFailureHalt and halts all new dispatch project-wide until
                  `tide resume --retry-failed` is run.
                type: string
              gates:
                description: Gates declares per-level human gate policy (Phase 4).
                properties:
                  milestone:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  pauseBetweenWaves:
                    type: boolean
                  phase:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  plan:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                  task:
                    description: |-
                      GatePolicy is one of "auto" | "approve" | "pause" — per-level human gate.
                      Phase 1 ships the field shape; Phase 4 consumes.
                    enum:
                    - auto
                    - approve
                    - pause
                    type: string
                type: object
              git:
                description: |-
                  Git declares the per-Project target repo + creds for artifact push
                  (Phase 3 D-B6). Required for any Project whose lifecycle reaches push;
                  optional in v1.0 only for purely transient/test Projects.
                  Pointer so omitempty fully elides the field when absent — value-type
                  GitConfig{} would serialize as `git: {repoURL: ""}` and trip the
                  RepoURL pattern validation on existing Phase 2 test fixtures.
                properties:
                  agentEmail:
                    description: |-
                      AgentEmail is the committer/author email paired with AgentName at all
                      three commit sites (SIGN-01). Precedence (D-03): this field → chart
                      agent.email → the compiled-in "tide-agent@tideproject.k8s" default.
                      Operators should choose a real, routable address: deferred commit
                      signing will require the committer email to match a verified
                      machine-account email, so picking one now avoids churn. Angle brackets,
                      whitespace, and non x@y shapes are rejected (T-36-01).
                    maxLength: 254
                    pattern: ^[^<>@\s]+@[^<>@\s]+$
                    type: string
                  agentName:
                    description: |-
                      AgentName is the committer/author name TIDE stamps at all three commit
                      sites — the harness task commit, the integrate merge commit, and the
                      tide-push boundary commit (SIGN-01). Precedence (D-03): this field →
                      chart agent.name → the compiled-in "TIDE Agent" default. Angle brackets
                      and newlines are rejected because they corrupt git commit headers
                      (T-36-01).
                    maxLength: 100
                    pattern: ^[^<>\r\n]+$
                    type: string
                  baseRef:
                    description: |-
                      BaseRef optionally names the ref the run branch is created from: an
                      existing branch name, tag name, full 40-hex commit SHA, or a fully
                      qualified refs/... path. Absent means the remote default branch (HEAD).
                      Resolution happens in the clone Job; an unresolvable value surfaces as
                      CloneFailed/BaseRefUnresolvable. Edits after a successful clone are
                      inert — the run branch is created once (see docs/project-authoring.md).
                    maxLength: 250
                    minLength: 1
                    pattern: ^[A-Za-z0-9][A-Za-z0-9._+@/-]*$
                    type: string
                  credsSecretRef:
                    description: |-
                      CredsSecretRef is the K8s Secret name (same-namespace) carrying the
                      HTTPS PAT in data key GIT_PAT. Cross-namespace Secret refs are NOT
                      permitted in v1.0 (threat-mitigation deferred to push Job — plan 03-06).
                    type: string
                  leaksConfigRef:
                    description: |-
                      LeaksConfigRef is an optional ConfigMap name carrying gitleaks rule
                      overrides (D-B3). Default gitleaks rules are embedded in the push image
                      when this is empty.
                    type: string
                  repoURL:
                    description: |-
                      RepoURL is the URL of the target git remote. Supports http:// and https://
                      (pure-Go go-git transport, production default) and SSH
                      (git@host:owner/repo.git, documented with host-key caveats).
                      file:// is NOT supported: go-git's file:// transport shells out to a
                      system git binary absent from production images.
                    pattern: ^(https?://|git@).+
                    type: string
                required:
                - credsSecretRef
                - repoURL
                type: object
              importSource:
                description: |-
                  ImportSource declares envelope salvage source for this Project.
                  When non-nil, ImportController runs the one-shot UID-rewrite import
                  state machine and all five planner-dispatch sites park until
                  ImportComplete=True (Phase 28 D-01/D-02).
                properties:
                  salvagedPVCSubPath:
                    description: |-
                      SalvagedPVCSubPath is the sub-path within the shared tide-projects PVC
                      where the salvaged envelopes reside, e.g. "<oldProjectUID>/workspace".
                    minLength: 1
                    type: string
                  seedManifestConfigMap:
                    description: |-
                      SeedManifestConfigMap names a ConfigMap in the project namespace
                      carrying the seed manifest JSON (FQ-name → oldUID + initial status).
                    minLength: 1
                    type: string
                required:
                - salvagedPVCSubPath
                - seedManifestConfigMap
                type: object
              maxAttemptsPerTask:
                description: |-
                  MaxAttemptsPerTask caps the number of dispatch attempts per Task before
                  the Task is marked failed (Phase 2+, consumed by TaskReconciler in Plan 09).
                format: int32
                maximum: 10
                minimum: 1
                type: integer
              outcomePrompt:
                description: |-
                  OutcomePrompt is the human-authored outcome statement that TIDE turns
                  into a phase brief + PLAN.md + tasks (Phase 5 BOOT-04). The planner
                  subagent reads this verbatim from .spec; the v1.0 stub-subagent ignores
                  it (small samples can leave it empty for the smoke-test path).
                  Multi-line YAML literals (`|`) are the conventional shape.
                type: string
              planAdmission:
                description: PlanAdmission controls file-touch policy during plan validation
                  (Phase 2+).
                properties:
                  fileTouchMode:
                    description: |-
                      FileTouchMode determines how file-touch mismatches are handled:
                        "strict" — reject plans whose file touches deviate from declarations.
                        "warn"   — admit but annotate the mismatch on Plan.Status.
                    enum:
                    - strict
                    - warn
                    type: string
                type: object
              providerSecretRef:
                description: ProviderSecretRef is the name of the K8s Secret carrying
                  provider credentials (Phase 2+).
                type: string
              providers:
                description: Providers lists per-provider configuration (rate limits,
                  etc.) (Phase 2+).
                items:
                  description: ProviderConfig configures one LLM provider (Phase 2+).
                  properties:
                    allowedRoutes:
                      description: |-
                        AllowedRoutes optionally extends the hardcoded credproxy allowlist
                        (POST /v1/messages + POST /v1/messages/count_tokens) with additional
                        (method, path-prefix) tuples. Use this to grant the subagent access
                        to newly-released LLM endpoints (Files API, Search Tools, prompt
                        caching) without rebuilding the credproxy image.
                        Hardcoded safe defaults ALWAYS apply — operator additions are
                        additive, never restrictive. Admin/billing paths are rejected at
                        admission (defense in depth).
                      items:
                        description: |-
                          RouteSpec is a (method, path-prefix) tuple used to extend the credproxy
                          upstream allowlist for a Project (Phase 04.1 P4.2). The credproxy sidecar
                          always enforces the hardcoded baseline (POST /v1/messages and
                          POST /v1/messages/count_tokens); RouteSpec entries are additive extensions,
                          never replacements.
                        properties:
                          method:
                            description: Method is the HTTP method. Currently only GET
                              and POST are accepted.
                            enum:
                            - GET
                            - POST
                            type: string
                          pathPrefix:
                            description: |-
                              PathPrefix is the URL path prefix. Must start with "/v1/" — paths
                              outside the Anthropic API surface are rejected at admission.
                            pattern: ^/v1/[a-zA-Z0-9_/-]+$
                            type: string
                        required:
                        - method
                        - pathPrefix
                        type: object
                      type: array
                    name:
                      description: Name is the provider identifier (only "anthropic"
                        is supported in v1).
                      enum:
                      - anthropic
                      type: string
                    requestsPerMinute:
                      description: RequestsPerMinute optionally caps API requests per
                        minute for this provider.
                      format: int32
                      type: integer
                    tokensPerMinute:
                      description: TokensPerMinute optionally caps token throughput
                        per minute for this provider.
                      format: int32
                      type: integer
                  required:
                  - name
                  type: object
                type: array
              schemaRevision:
                description: |-
                  SchemaRevision identifies the v1alpha3 schema shape. Required in
                  v1alpha3; its absence on a reconciled object signals a Project
                  authored under a prior schema revision that slipped into etcd before
                  the CRD upgrade. The Project reconciler head guard checks this field:
                  if SchemaRevision != "v1alpha3" the reconciler fail-closes with
                  RequiresReinstall condition + reconcile.TerminalError (no requeue).
                  Reinstall: kubectl delete project <name> && kubectl apply -f
                  <project.yaml> (with SchemaRevision: v1alpha3 set). This field is
                  absent from pre-v1alpha3 ProjectSpec shapes, making it the clean
                  discriminator for D-09. See docs/migration/v1alpha2-to-v1alpha3.md.
                enum:
                - v1alpha3
                type: string
              secretRefs:
                description: SecretRefs references K8s Secrets for credentials (AUTH-01
                  — Phase 3).
                properties:
                  anthropicAPIKey:
                    description: AnthropicAPIKey is the Secret name carrying the LLM
                      API key.
                    type: string
                  gitCredentials:
                    description: GitCredentials is the Secret name carrying git push
                      credentials (PAT or SSH key).
                    type: string
                type: object
              subagent:
                description: |-
                  Subagent declares provider+model selection for planner/executor dispatch
                  (Phase 3 D-C2). When empty, Helm-chart defaults apply.
                properties:
                  image:
                    description: |-
                      Image is the default subagent image reference for all levels.
                      Example: "ghcr.io/jsquirrelz/tide-claude-subagent:v0.1.0".
                    type: string
                  levels:
                    description: Levels carries per-level overrides; any subset is valid.
                    properties:
                      milestone:
                        description: |-
                          Milestone optionally overrides settings for the planner that authors
                          MILESTONE.md (the Project-level planning dispatch).
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                      phase:
                        description: |-
                          Phase optionally overrides settings for the planner that authors phase
                          briefs.
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                      plan:
                        description: |-
                          Plan optionally overrides settings for the planner that authors
                          PLAN.md and the task DAG (two dispatches share this one slot).
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                      task:
                        description: Task optionally overrides settings for the task
                          executor (diffs).
                        properties:
                          image:
                            description: |-
                              Image override is schema-present-but-not-enforced in v1.0 (deferred
                              to v1.x per CONTEXT.md "Deferred Ideas" — per-level cross-vendor
                              image overrides). Set this in v1.0 only if the consumer is prepared
                              to ignore it.
                            type: string
                          model:
                            description: Model identifier for this level (e.g., "claude-haiku-4-5").
                            type: string
                          params:
                            additionalProperties:
                              type: string
                            description: |-
                              Params carries per-vendor tuning passthrough (temperature, thinking
                              budget, etc.). Validation lives in the provider's Subagent impl.
                            type: object
                        type: object
                    type: object
                  model:
                    description: |-
                      Model is the default model identifier for all levels.
                      Example: "claude-sonnet-4-6" (anthropic), "o1-mini" (openai).
                    type: string
                type: object
              targetRepo:
                description: |-
                  TargetRepo is the URL of the repo this Project operates on. Supports
                  http:// and https:// (pure-Go go-git transport, production default) and
                  SSH (`git@host:owner/repo.git`, documented with host-key caveats).
                  file:// is NOT supported: go-git's file:// transport requires a system
                  git binary absent from production images.
                minLength: 1
                type: string
              verification:
                description: |-
                  Verification declares per-level default verification contracts
                  (Phase 52 D-01). Task/Plan resolve their own Spec.Verification field
                  first; an absent field falls back to the matching entry here. See
                  VerificationDefaults' doc comment for the Pitfall-4 Draft-only
                  authoring convention.
                properties:
                  milestone:
                    description: |-
                      VerificationSpec is the planner-authored, immutable-once-locked
                      verification contract for a Task (Phase 51 TASK-01/D-01). Mirrors the
                      Gates/Caps standalone-type precedent — NOT inline TaskSpec fields — so the
                      identical VerificationSpec shape generalizes to Plan.Spec/Project.Spec with
                      a Task > Plan > Project precedence in Phase 52 (this phase is Task-scoped
                      only; Plan/Project fields are OUT OF SCOPE here).
  
                      Design note (RESEARCH Pitfall 2 / Open Question 1): the governing Phase/
                      Version fields live HERE on spec — not on TaskStatus — because a CEL
                      x-kubernetes-validations transition rule reading oldSelf can only see the
                      prior state of its own spec subtree; a spec-level rule cannot reference
                      status. Only the observed LockedSHA (a coarse dispatch-time anchor) lives on
                      TaskStatus.
  
                      Scope of the CEL rule below (LO-04): it enforces the CORE invariant — a
                      Locked contract cannot be silently mutated while staying Locked. It does NOT
                      enforce version monotonicity (the `version > oldSelf.version` bump is
                      documented but unchecked), and it permits changing the pass-criteria fields
                      in the SAME update that flips phase to 'Superseded' (no content-freeze across
                      the Locked->Superseded transition). Those are edge gaps in the supersede
                      lifecycle, not the core no-silent-mutation guarantee.
                    properties:
                      commands:
                        description: |-
                          Commands lists additional acceptance-signal commands beyond
                          GateCommand. Plan 06 resolves this list onto the transported
                          VerifyContext.Commands list; the Plan 02 verifier executes EACH
                          command out-of-band (exit codes parsed, any non-zero dominates any
                          LLM APPROVED — TASK-04). Not decorative.
                        items:
                          type: string
                        type: array
                      evaluator:
                        description: |-
                          Evaluator names the evaluator config this verification contract
                          resolves against (same-namespace name ref, plain string — not
                          corev1.LocalObjectReference).
                        type: string
                      gateCommand:
                        description: |-
                          GateCommand is the single canonical primary pass-criterion command —
                          resolves onto pkg/dispatch.VerifyContext.GateCommand at verifier
                          dispatch time (Plan 06). This is planner-authored data EXECUTED FOR
                          REAL downstream, NOT decorative/status text: the independent verifier
                          runs it and parses the exit code (TASK-04); a non-zero exit dominates
                          any LLM judge's APPROVED verdict.
                        type: string
                      maxIterations:
                        default: 0
                        description: |-
                          MaxIterations bounds the Task loop's repeat policy: the maximum
                          number of evaluator-driven fresh attempts the loop may dispatch
                          before halting (D-07/TASK-05).
  
                          NOT omitempty, with an explicit default of 0: 0 is a MEANINGFUL value
                          (the Phase/Milestone/Project escalate-levels resolve to maxIterations:0),
                          not "unset". With omitempty a stored 0 vanishes on a controller's Go
                          round-trip Update() while the apiserver's stored copy keeps it, so the
                          VerificationSpec CEL `self == oldSelf` immutability rule below sees
                          present-0 vs absent and fails "verification is immutable once Locked" on
                          every reconcile — blocking a Locked phase/milestone/project contract
                          from ever progressing (a live-proof finding; envtest's fake client does
                          not enforce CEL). The default forces the apiserver to store a present 0
                          even when the field is omitted at apply time, so stored and
                          round-tripped forms are byte-identical and the rule holds.
                        format: int32
                        minimum: 0
                        type: integer
                      onExhaustion:
                        description: |-
                          OnExhaustion declares the bounded exit path once MaxIterations is
                          reached without an APPROVED evaluation. In Phase 51 BOTH enum values
                          resolve IDENTICALLY to ConditionVerifyHalt + await `tide resume` —
                          per-value differentiation (a future LoopPolicy.EscalationPolicy) is
                          Phase 52 scope. Declared-but-uniform-now, never unenforced: both
                          values halt dispatch today.
                        enum:
                        - escalate
                        - requireApproval
                        type: string
                      phase:
                        description: |-
                          Phase is the lifecycle state governing immutability: Draft is freely
                          editable, Locked is immutable except for a Locked->Superseded
                          transition (which mints a new version to carry further edits),
                          Superseded is a terminal historical record. Transition rules are
                          skipped on CREATE (no oldSelf) — a Draft-at-create is unconstrained.
                        enum:
                        - Draft
                        - Locked
                        - Superseded
                        type: string
                      requiredArtifacts:
                        description: |-
                          RequiredArtifacts lists workspace-relative paths the verifier
                          confirms exist.
                        items:
                          type: string
                        type: array
                      version:
                        description: |-
                          Version is the monotonic version number, incremented each time a
                          Locked contract is superseded by a new Draft.
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                    x-kubernetes-validations:
                    - message: verification is immutable once Locked; supersede to a
                        new version to change it
                      rule: oldSelf.phase != 'Locked' || self == oldSelf || self.phase
                        == 'Superseded'
                  phase:
                    description: |-
                      VerificationSpec is the planner-authored, immutable-once-locked
                      verification contract for a Task (Phase 51 TASK-01/D-01). Mirrors the
                      Gates/Caps standalone-type precedent — NOT inline TaskSpec fields — so the
                      identical VerificationSpec shape generalizes to Plan.Spec/Project.Spec with
                      a Task > Plan > Project precedence in Phase 52 (this phase is Task-scoped
                      only; Plan/Project fields are OUT OF SCOPE here).
  
                      Design note (RESEARCH Pitfall 2 / Open Question 1): the governing Phase/
                      Version fields live HERE on spec — not on TaskStatus — because a CEL
                      x-kubernetes-validations transition rule reading oldSelf can only see the
                      prior state of its own spec subtree; a spec-level rule cannot reference
                      status. Only the observed LockedSHA (a coarse dispatch-time anchor) lives on
                      TaskStatus.
  
                      Scope of the CEL rule below (LO-04): it enforces the CORE invariant — a
                      Locked contract cannot be silently mutated while staying Locked. It does NOT
                      enforce version monotonicity (the `version > oldSelf.version` bump is
                      documented but unchecked), and it permits changing the pass-criteria fields
                      in the SAME update that flips phase to 'Superseded' (no content-freeze across
                      the Locked->Superseded transition). Those are edge gaps in the supersede
                      lifecycle, not the core no-silent-mutation guarantee.
                    properties:
                      commands:
                        description: |-
                          Commands lists additional acceptance-signal commands beyond
                          GateCommand. Plan 06 resolves this list onto the transported
                          VerifyContext.Commands list; the Plan 02 verifier executes EACH
                          command out-of-band (exit codes parsed, any non-zero dominates any
                          LLM APPROVED — TASK-04). Not decorative.
                        items:
                          type: string
                        type: array
                      evaluator:
                        description: |-
                          Evaluator names the evaluator config this verification contract
                          resolves against (same-namespace name ref, plain string — not
                          corev1.LocalObjectReference).
                        type: string
                      gateCommand:
                        description: |-
                          GateCommand is the single canonical primary pass-criterion command —
                          resolves onto pkg/dispatch.VerifyContext.GateCommand at verifier
                          dispatch time (Plan 06). This is planner-authored data EXECUTED FOR
                          REAL downstream, NOT decorative/status text: the independent verifier
                          runs it and parses the exit code (TASK-04); a non-zero exit dominates
                          any LLM judge's APPROVED verdict.
                        type: string
                      maxIterations:
                        default: 0
                        description: |-
                          MaxIterations bounds the Task loop's repeat policy: the maximum
                          number of evaluator-driven fresh attempts the loop may dispatch
                          before halting (D-07/TASK-05).
  
                          NOT omitempty, with an explicit default of 0: 0 is a MEANINGFUL value
                          (the Phase/Milestone/Project escalate-levels resolve to maxIterations:0),
                          not "unset". With omitempty a stored 0 vanishes on a controller's Go
                          round-trip Update() while the apiserver's stored copy keeps it, so the
                          VerificationSpec CEL `self == oldSelf` immutability rule below sees
                          present-0 vs absent and fails "verification is immutable once Locked" on
                          every reconcile — blocking a Locked phase/milestone/project contract
                          from ever progressing (a live-proof finding; envtest's fake client does
                          not enforce CEL). The default forces the apiserver to store a present 0
                          even when the field is omitted at apply time, so stored and
                          round-tripped forms are byte-identical and the rule holds.
                        format: int32
                        minimum: 0
                        type: integer
                      onExhaustion:
                        description: |-
                          OnExhaustion declares the bounded exit path once MaxIterations is
                          reached without an APPROVED evaluation. In Phase 51 BOTH enum values
                          resolve IDENTICALLY to ConditionVerifyHalt + await `tide resume` —
                          per-value differentiation (a future LoopPolicy.EscalationPolicy) is
                          Phase 52 scope. Declared-but-uniform-now, never unenforced: both
                          values halt dispatch today.
                        enum:
                        - escalate
                        - requireApproval
                        type: string
