version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    goconst:
      # The TIDE domain vocabulary (phase-status values, ValidationState values,
      # CRD-Kind/level names, K8s defaults, mode flags, and metric-label
      # sentinels) is used as bare literals consistently across all controllers,
      # webhooks, and CLIs. A const indirection for these single-word tokens
      # hurts switch/comparison readability without adding safety. `unknown` is
      # the D-09 metric-label sentinel shared by the task/plan reconcilers;
      # `FileTouchMismatch` is a ValidationState value (sibling of the already-
      # listed `Validated`). goconst still flags any OTHER repeated literal.
      ignore-string-values:
        - '^(Pending|Running|Succeeded|Failed|AwaitingApproval|BudgetExceeded|PushLeaseFailed|PushLeakBlocked|Validated|FileTouchMismatch|unknown|milestone|Milestone|phase|Phase|plan|Plan|task|Task|wave|Wave|project|Project|default|strict|warn|subagent|true|false)$'
    errcheck:
      # The fmt.Fprint* family writes to stdout/stderr (CLI diagnostics, banners,
      # tabwriter buffers). A failed write to those is not actionable in this
      # codebase — the canonical errcheck exclusion. Real I/O error paths
      # (os.File.Close on writes, network) are NOT excluded and remain enforced.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
        settings:
          # Phase 04.1 P4.4: tightened sub-checks to enforce the post-sweep convention.
          # Knob names verified against logcheck v0.10.1 (sigs.k8s.io/logtools) via
          # source inspection of gclplugin/plugin.go (settings.Check map[string]bool)
          # and logcheck/pkg/logcheck.go constants before committing.
          # The check map uses names WITHOUT the "check-" prefix (plugin convention).
          # Defaults already on: structured, parameters, deprecations,
          #   verbosity-zero, verbosity-error, key.
          # Enabling additional checks:
          check:
            with-helpers: true
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      # Test files are exempt from opinionated/style linters only. All linters
      # remain ENABLED for production code. errcheck on tests is conventional
      # (defer x.Close() in tests is idiomatic); lll/unparam/goconst/dupl are
      # noise on table-driven test helpers and fixtures; gocyclo on tests
      # punishes long sequential table-driven/scenario funcs that have no
      # production complexity budget to protect.
      - linters:
          - lll
          - unparam
          - goconst
          - dupl
          - errcheck
          - gocyclo
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
      # Generated by `go generate ./cmd/tide-demo-init/...` (//go:embed all:fixture).
      # gitignored copy of examples/tide-demo-fixture/ — not hand-maintained source.
      - cmd/tide-demo-init/fixture
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
