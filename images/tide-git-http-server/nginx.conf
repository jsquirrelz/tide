# /etc/nginx/nginx.conf — tide-git-http-server
#
# Serves git repositories via git-http-backend CGI over FastCGI (fcgiwrap).
# Enables anonymous fetch (GIT_HTTP_EXPORT_ALL — no git-daemon-export-ok file
# required). Anonymous push (receive-pack) is enabled per-repo via the served
# repo's own `http.receivepack=true` config — set at seed time by tide-demo-init
# and self-healed at startup by entrypoint.sh (debug #15). git-http-backend does
# NOT honor a GIT_HTTP_RECEIVE_PACK CGI variable, so none is passed here; the
# repo config is the only switch that enables the receive-pack service.
#
# Binary path: /usr/libexec/git-core/git-http-backend (from git-daemon package on Alpine)
# Socket:      /run/nginx/fcgi.sock (created by spawn-fcgi in entrypoint.sh;
#              nonroot-owned dir — /run itself is root-owned)
# Repo root:   /srv/git (demo-remote-pvc mounted here in the Deployment)
#
# T-08-05-01 mitigation: This server is exposed only as ClusterIP — it is
# NOT reachable from outside the cluster (no NodePort, no LoadBalancer).
# Anonymous push is intentional for demo context only.

# The container already runs as nonroot UID 1000 (Dockerfile USER 1000 +
# Deployment securityContext). The `user` directive only applies when the
# master runs as root; setting it here would emit a warning and is ignored,
# so it is intentionally omitted.
worker_processes auto;
pid /run/nginx/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile on;
    tcp_nopush on;

    server {
        # Listen on a non-privileged port (>=1024). The container runs as
        # nonroot UID 1000, which cannot bind port 80. The Service maps its
        # port 80 → targetPort 8080, so the http://git-http-server/ URL is
        # unchanged for clients.
        listen 8080;
        server_name _;

        # Match any git repository URL pattern: /repo-name.git or /repo-name.git/...
        # PATH_INFO carries the full URI so git http-backend can route to
        # the correct repository + operation (upload-pack/receive-pack/info/refs).
        location ~ ^(/[^/]+\.git)(/.*)?$ {
            root /srv/git;

            fastcgi_pass unix:/run/nginx/fcgi.sock;

            # SCRIPT_FILENAME: absolute path to git-http-backend CGI binary.
            # On Alpine, git-http-backend is installed by the git-daemon package at:
            #   /usr/libexec/git-core/git-http-backend
            # (Assumption A1 verified: present after `apk add git-daemon`)
            fastcgi_param SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;

            # Enable anonymous fetch without requiring git-daemon-export-ok file.
            fastcgi_param GIT_HTTP_EXPORT_ALL "";

            # NOTE (debug #15): anonymous PUSH is NOT enabled by a fastcgi param.
            # git-http-backend advertises receive-pack only when the served repo's
            # own config has http.receivepack=true (set by tide-demo-init at seed
            # time and by entrypoint.sh at startup). A GIT_HTTP_RECEIVE_PACK
            # variable is NOT honored by git-http-backend and was removed here.

            # Parent directory of git repositories on disk.
            # The Deployment mounts demo-remote-pvc at /srv/git/, so
            # /srv/git/demo-remote.git is the bare repo served here.
            fastcgi_param GIT_PROJECT_ROOT /srv/git;

            # Pass the full URI as PATH_INFO so git http-backend can identify
            # which repo + operation is requested.
            # e.g. /demo-remote.git/info/refs → PATH_INFO=/demo-remote.git/info/refs
            fastcgi_param PATH_INFO $uri;

            # Standard FastCGI params (QUERY_STRING, REQUEST_METHOD, CONTENT_TYPE,
            # CONTENT_LENGTH, SERVER_NAME, SERVER_PORT, etc.) from nginx's built-in
            # fastcgi_params file.
            include fastcgi_params;
        }

        # Health check endpoint for Deployment readiness (optional but useful).
        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
